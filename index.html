<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET · Neo P2P | Sürükleyici Temalar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0B1120;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.25s ease;
        }

        .app-wrapper {
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border-radius: 0;
            transition: background 0.25s, color 0.2s;
        }

        @media (min-width: 768px) {
            html, body {
                position: relative;
                overflow: auto;
            }
            body {
                padding: 20px;
                background: radial-gradient(circle at 20% 30%, #1E293B, #0F172A);
            }
            .app-wrapper {
                height: auto;
                min-height: 0;
                max-width: 600px;
                width: 100%;
                margin: 0 auto;
                border-radius: 40px;
                box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
                background: #FFFFFF;
                overflow: hidden;
                transition: transform 0.2s;
            }
            .chat-container {
                border-radius: 40px;
                height: 88vh;
                max-height: 820px;
            }
        }

        @media (max-width: 767px) {
            html, body, .app-wrapper, .chat-container {
                margin: 0;
                padding: 0;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                height: 100%;
                border-radius: 0;
                overflow: hidden;
            }
            .app-header {
                padding-top: env(safe-area-inset-top, 0);
            }
            .input-container {
                padding-bottom: env(safe-area-inset-bottom, 0);
            }
        }

        /* header — dinamik renk */
        .app-header {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            transition: background 0.25s, border-color 0.2s;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 1.9rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .header-text h2 {
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, #C084FC, #9333EA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .sub-title {
            font-size: 0.6rem;
            opacity: 0.7;
            font-weight: 600;
        }
        .icon-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 1.25rem;
            padding: 8px;
            border-radius: 44px;
            cursor: pointer;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .icon-btn:hover {
            background: #8B5CF6;
            color: white;
            border-color: #8B5CF6;
            transform: scale(1.02);
        }

        .connection-bar {
            padding: 7px 16px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            flex-shrink: 0;
            background: #F1F5F9;
            color: #1E293B;
            transition: all 0.2s;
        }
        .connection-bar.error { background: #FEF2F2; color: #DC2626; }
        .connection-bar.success { background: #E0F2FE; color: #0284C7; }

        .current-chat-header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.25);
            flex-shrink: 0;
        }
        .chat-contact-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .chat-status-light {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: 0.2s;
            box-shadow: 0 0 6px currentColor;
        }
        .chat-status-light.online { background: #10B981; box-shadow: 0 0 8px #10B981; }
        .chat-status-light.offline { background: #94A3B8; }
        .chat-status-light.connecting { background: #F59E0B; animation: pulse 1s infinite; }
        .chat-contact-name {
            font-weight: 700;
            font-size: 1.2rem;
            background: rgba(139, 92, 246, 0.12);
            padding: 4px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        .typing-badge-small {
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 30px;
            animation: fadeIn 0.2s;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            background: #F9FAFB;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
            transition: background 0.25s;
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-track { background: #E2E8F0; border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: #A78BFA; border-radius: 10px; }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: messageAppear 0.2s ease-out;
        }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; align-items: flex-start; }

        .message-content {
            padding: 10px 18px;
            border-radius: 26px;
            word-wrap: break-word;
            font-size: 0.94rem;
            line-height: 1.45;
            font-weight: 470;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .sent .message-content {
            background: linear-gradient(115deg, #8B5CF6, #7C3AED);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .received .message-content {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-bottom-left-radius: 6px;
        }
        .message-time {
            font-size: 0.55rem;
            color: #94A3B8;
            margin-top: 4px;
            margin-left: 10px;
            margin-right: 10px;
        }

        .input-container {
            flex-shrink: 0;
            background: #FFFFFF;
            border-top: 1px solid #E2E8F0;
            padding: 12px 20px;
            backdrop-filter: blur(10px);
        }
        .message-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #E2E8F0;
            border-radius: 44px;
            outline: none;
            font-size: 0.95rem;
            background: #F8FAFC;
            transition: all 0.2s;
        }
        #messageInput:focus {
            border-color: #A855F7;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
            background: #FFFFFF;
        }
        #sendButton {
            flex-shrink: 0;
            padding: 10px 24px;
            background: linear-gradient(95deg, #8B5CF6, #7C3AED);
            color: white;
            border: none;
            border-radius: 44px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(139,92,246,0.3);
        }

        /* Sidebar Elegant */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 86%;
            max-width: 380px;
            height: 100%;
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(28px);
            box-shadow: -8px 0 32px rgba(0,0,0,0.3);
            z-index: 2000;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-left: 1px solid rgba(168, 85, 247, 0.3);
        }
        .sidebar.open { right: 0; }
        .sidebar-header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(168,85,247,0.4);
        }
        .sidebar-header h3 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #C084FC, #A855F7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .close-sidebar {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 1.6rem;
            width: 38px;
            height: 38px;
            border-radius: 40px;
            cursor: pointer;
            color: #E2E8F0;
        }

        .sidebar-content {
            flex: 1;
            padding: 20px;
        }
        .settings-section {
            margin-bottom: 28px;
            background: rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
        }
        .settings-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #C084FC;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .settings-value {
            background: rgba(0,0,0,0.3);
            padding: 12px 16px;
            border-radius: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .settings-value span { font-family: monospace; font-size: 0.85rem; color: #F1F5F9; }
        .mini-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .mini-btn.primary { background: #A855F7; color: white; }
        .mini-btn.danger { background: rgba(220,38,38,0.8); color: white; }

        .theme-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }
        .theme-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 10px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.2s;
        }
        .theme-preview { display: flex; gap: 12px; align-items: center; }
        .theme-color-badge {
            width: 36px;
            height: 36px;
            border-radius: 40px;
            background: linear-gradient(135deg, #8B5CF6, #A855F7);
        }
        .theme-name { font-weight: 600; color: #F1F5F9; }
        .theme-active-badge { background: #A855F7; padding: 4px 12px; border-radius: 30px; font-size: 0.65rem; font-weight: bold; color: white; }

        .contacts-list-sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .contact-item-sidebar {
            background: rgba(255,255,255,0.07);
            border-radius: 28px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(168,85,247,0.3);
        }
        .contact-clickable { cursor: pointer; flex: 1; }
        .contact-name-sidebar { font-weight: 700; color: #F1F5F9; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .contact-phone-sidebar { font-size: 0.7rem; color: #CBD5E1; margin-top: 4px; }
        .edit-key {
            background: rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }
        .add-contact-btn-sidebar {
            width: 100%;
            background: linear-gradient(95deg, #A855F7, #7C3AED);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 44px;
            font-weight: 700;
            margin-top: 24px;
            cursor: pointer;
        }
        .modal-overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: #1E293B;
            width: 85%;
            max-width: 340px;
            border-radius: 40px;
            padding: 24px;
            color: #F1F5F9;
            border: 1px solid #A855F7;
        }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin: 12px 0;
            border: 1px solid #475569;
            border-radius: 44px;
            background: #0F172A;
            color: white;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-save { background: #A855F7; color: white; flex:1; padding:10px; border-radius:44px; border:none; cursor:pointer; font-weight:600; }
        .modal-cancel { background: #334155; color: white; flex:1; border-radius:44px; border:none; cursor:pointer; }

        .contact-badge { font-size: 0.6rem; background: #A855F7; padding: 2px 8px; border-radius: 50px; color: white; }
        .contact-badge.unread { background: #F97316; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9);} 100% { opacity: 1; transform: scale(1.2);} }
        @keyframes messageAppear { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-contact-selected { text-align: center; color: #94A3B8; padding: 48px 20px; }
        .system-message { background: #F1F5F9; font-size: 0.7rem; text-align: center; padding: 6px; border-radius: 30px; margin: 8px auto; }
        hr { margin: 20px 0; border-top: 1px solid #334155; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="chat-container" id="chatContainer">
        <div class="app-header">
            <div class="logo-section"><div class="logo-icon">🛸</div><div class="header-text"><h2>SEYFİÇET</h2><div class="sub-title">✧ Neo P2P · Temalar ✧</div></div></div>
            <div class="header-buttons"><button class="icon-btn" id="settingsBtn">⚙️</button><button class="icon-btn" id="contactsBtn">👥</button></div>
        </div>
        <div class="connection-bar" id="status">✨ Başlatılıyor...</div>
        <div class="current-chat-header" id="currentChatHeader" style="display: none;"><div class="chat-contact-info"><div class="chat-status-light" id="chatStatusLight"></div><span class="chat-contact-name" id="currentChatName">—</span><span id="chatTypingIndicator" style="display:none;" class="typing-badge-small">✍️ yazıyor...</span></div></div>
        <div class="messages-area" id="messagesArea"><div class="no-contact-selected">✨ Bir kişi seçin ✨</div></div>
        <div class="input-container" id="inputContainer" style="display: none;"><div class="message-input-row"><input type="text" id="messageInput" placeholder="Mesaj yazın..." disabled><button id="sendButton" disabled>Gönder</button></div></div>
    </div>
</div>
<div class="sidebar" id="sidebar"><div class="sidebar-header"><h3 id="sidebarTitle">Ayarlar</h3><button class="close-sidebar" id="closeSidebar">✕</button></div><div class="sidebar-content" id="sidebarContent"></div></div>
<div id="contactModal" style="display: none;" class="modal-overlay"><div class="modal-content"><h3>➕ Yeni Kişi</h3><input type="text" id="contactNameInput" placeholder="Ad Soyad"><input type="tel" id="contactPhoneInput" placeholder="Telefon: +905551234567"><div class="modal-buttons"><button class="modal-cancel" id="modalCancelBtn">Vazgeç</button><button class="modal-save" id="modalSaveBtn">Kaydet</button></div></div></div>
<div id="editPhoneModal" style="display: none;" class="modal-overlay"><div class="modal-content"><h3>📞 Kendi Numaranız</h3><input type="tel" id="editPhoneInput" placeholder="+905551234567"><div class="warning-text" style="color:#FACC15; font-size:0.7rem;">⚠️ Kimliğinizdir, bağlantılar için kritik</div><div class="modal-buttons"><button class="modal-cancel" id="editPhoneCancel">Vazgeç</button><button class="modal-save" id="editPhoneSave">Kaydet</button></div></div></div>
<div id="editContactModal" style="display: none;" class="modal-overlay"><div class="modal-content"><h3>✏️ Kişi Düzenle</h3><input type="text" id="editContactNameInput" placeholder="Yeni ad"><input type="tel" id="editContactPhoneInput" placeholder="Yeni numara"><div class="modal-buttons"><button class="modal-cancel" id="editContactCancelBtn">Vazgeç</button><button class="modal-save" id="editContactSaveBtn">Güncelle</button></div></div></div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    // ===================== TEMA SİSTEMİ (Premium + Matrix, Neon, Deep Ocean) ==================
    const THEMES = {
        'matrix': { name: '💚 MATRIX · Yeşil Kod', bgHeader: '#0A0F0A', bgMessages: '#071A0A', bgInput: '#0C120C', borderColor: '#2E7D32', textPrimary: '#C8FFC8', sentGradient: 'linear-gradient(115deg, #1F6B2F, #0F4A1F)', receivedBg: '#142014', accent: '#2E7D32' },
        'neon_pulse': { name: '💜 NEON PULSE', bgHeader: '#0F0A1F', bgMessages: '#120C28', bgInput: '#0B0820', borderColor: '#B000FF', textPrimary: '#F0E6FF', sentGradient: 'linear-gradient(115deg, #C026D3, #A21CAF)', receivedBg: '#1A1535', accent: '#D946EF' },
        'deep_ocean': { name: '🌊 DERİN OKYANUS', bgHeader: '#04293A', bgMessages: '#064663', bgInput: '#033b4b', borderColor: '#1E88E5', textPrimary: '#E3F2FD', sentGradient: 'linear-gradient(115deg, #1E88E5, #0D47A1)', receivedBg: '#0B4F6C', accent: '#42A5F5' },
        'midnight_ember': { name: '🌙 Gece Koru', bgHeader: '#1A120B', bgMessages: '#2C1A12', bgInput: '#20160E', borderColor: '#E07C3C', textPrimary: '#FFE0B5', sentGradient: 'linear-gradient(115deg, #E07C3C, #B45309)', receivedBg: '#322418', accent: '#F97316' },
        'light_glass': { name: '☁️ Açık Cam', bgHeader: '#FEF9F0', bgMessages: '#FDF8F0', bgInput: '#FFFFFF', borderColor: '#E7DCC8', textPrimary: '#2D2A24', sentGradient: 'linear-gradient(115deg, #C084FC, #A855F7)', receivedBg: '#FFFFFF', accent: '#A855F7' }
    };
    let currentTheme = 'light_glass';
    function applyTheme(themeKey) {
        const t = THEMES[themeKey];
        if(!t) return;
        currentTheme = themeKey;
        const chatContainer = document.querySelector('.chat-container');
        const messagesArea = document.querySelector('.messages-area');
        const inputContainer = document.querySelector('.input-container');
        const appHeader = document.querySelector('.app-header');
        const currentChatHeader = document.querySelector('.current-chat-header');
        const statusBar = document.querySelector('.connection-bar');
        if(chatContainer) chatContainer.style.backgroundColor = t.bgHeader;
        if(messagesArea) messagesArea.style.backgroundColor = t.bgMessages;
        if(inputContainer) { inputContainer.style.backgroundColor = t.bgInput; inputContainer.style.borderTopColor = t.borderColor; }
        if(appHeader) { appHeader.style.backgroundColor = t.bgHeader + 'e6'; appHeader.style.borderBottomColor = t.borderColor; }
        if(currentChatHeader) currentChatHeader.style.backgroundColor = t.bgHeader + 'cc';
        if(statusBar) statusBar.style.backgroundColor = t.bgMessages;
        document.querySelectorAll('.received .message-content').forEach(el => { el.style.backgroundColor = t.receivedBg; el.style.borderColor = t.borderColor; el.style.color = t.textPrimary; });
        document.querySelectorAll('.sent .message-content').forEach(el => { el.style.background = t.sentGradient; });
        document.querySelectorAll('#messageInput').forEach(inp => { inp.style.backgroundColor = t.bgMessages; inp.style.borderColor = t.borderColor; inp.style.color = t.textPrimary; });
        localStorage.setItem('seyficet_theme_v3', themeKey);
        if(window.renderSidebarContent) renderSidebarContent();
    }
    function loadTheme() { let saved = localStorage.getItem('seyficet_theme_v3'); if(saved && THEMES[saved]) currentTheme = saved; else currentTheme = 'light_glass'; applyTheme(currentTheme); }

    // =============== P2P CORE ===============
    const PEER_CONFIG = { debug: 0, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun2.l.google.com:19302' }] } };
    let myPhoneNumber = "", peer = null, currentConnection = null, isConnected = false, activeContactId = null, activeContactName = "";
    let contacts = [], messagesHistory = {}, pendingMessages = {}, contactStatus = {}, unreadCounts = {};
    let currentSidebarMode = 'settings';
    
    const elements = {
        statusDiv: document.getElementById('status'), messagesArea: document.getElementById('messagesArea'), messageInput: document.getElementById('messageInput'),
        sendButton: document.getElementById('sendButton'), inputContainer: document.getElementById('inputContainer'), currentChatHeader: document.getElementById('currentChatHeader'),
        currentChatName: document.getElementById('currentChatName'), chatStatusLight: document.getElementById('chatStatusLight'), chatTypingIndicator: document.getElementById('chatTypingIndicator'),
        settingsBtn: document.getElementById('settingsBtn'), contactsBtn: document.getElementById('contactsBtn'), sidebar: document.getElementById('sidebar'),
        sidebarTitle: document.getElementById('sidebarTitle'), sidebarContent: document.getElementById('sidebarContent'), closeSidebar: document.getElementById('closeSidebar')
    };
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function updateStatus(msg, isError=false, isSuccess=false) { elements.statusDiv.innerHTML = msg; elements.statusDiv.classList.remove('error','success'); if(isError) elements.statusDiv.classList.add('error'); if(isSuccess) elements.statusDiv.classList.add('success'); }
    function savePhoneNumber(phone) { let clean = phone.trim().replace(/\s/g, ''); if(!clean) { myPhoneNumber=""; localStorage.removeItem('seyficet_phone'); if(peer) peer.destroy(); peer=null; updateStatus('❌ Numara boş', true); return false; } myPhoneNumber=clean; localStorage.setItem('seyficet_phone', myPhoneNumber); initPeer(); return true; }
    function loadPhoneNumber() { let saved = localStorage.getItem('seyficet_phone'); if(saved && saved.trim() !== "") { myPhoneNumber = saved.trim(); return true; } myPhoneNumber=""; return false; }
    function initPeer() { if(!myPhoneNumber) return; if(peer) { peer.destroy(); peer=null; } updateStatus(`🔗 ${myPhoneNumber} bağlanıyor...`); try { peer = new Peer(myPhoneNumber, PEER_CONFIG); peer.on('open', (id) => updateStatus(`✅ ${id} aktif`, false, true)); peer.on('error', (err) => { if(err.type === 'unavailable-id') updateStatus(`❌ "${myPhoneNumber}" kullanımda!`, true); else updateStatus(`⚠️ Peer hatası`, true); }); peer.on('connection', handleIncomingConnection); } catch(e) { updateStatus(`❌ init hatası`, true); } }
    function handleIncomingConnection(conn) { let contact = contacts.find(c => c.phoneNumber === conn.peer); if(!contact) { conn.close(); return; } if(currentConnection) currentConnection.close(); currentConnection = conn; activeContactId = contact.id; activeContactName = contact.name; elements.currentChatName.innerText = contact.name; setupConnectionEvents(currentConnection, contact.id, contact.name); updateContactStatus(contact.id, 'connected'); setConnectedState(true); updateStatus(`✅ ${contact.name} bağlandı`, false, true); flushPendingMessages(contact.id); showChatInterface(true); renderMessagesForActiveContact(); renderSidebarContent(); }
    function setupConnectionEvents(conn, cid, cname) { conn.on('open', () => { if(activeContactId===cid) { isConnected=true; setConnectedState(true); updateContactStatus(cid,'connected'); flushPendingMessages(cid); } }); let typingTimer=null; conn.on('data', (data) => { if(activeContactId===cid && currentConnection===conn) { if(data.type==='text') addMessageToHistory(cid, data.text, cname, false, 'text'); else if(data.type==='typing') { elements.chatTypingIndicator.style.display='inline-block'; if(typingTimer) clearTimeout(typingTimer); typingTimer=setTimeout(()=>elements.chatTypingIndicator.style.display='none',2000); } } }); conn.on('close', () => { if(activeContactId===cid && currentConnection===conn) { updateContactStatus(cid,'offline'); setConnectedState(false); currentConnection=null; isConnected=false; updateStatus(`❌ ${cname} bağlantı kapandı`); } }); }
    function connectToContact(id, phone, name) { if(!myPhoneNumber) { alert('Önce kendi numaranızı ayarlayın!'); return; } if(activeContactId===id && isConnected) return; if(currentConnection) { currentConnection.close(); currentConnection=null; isConnected=false; } activeContactId=id; activeContactName=name; elements.currentChatName.innerText=name; updateChatHeaderStatus(); renderMessagesForActiveContact(); updateContactStatus(id,'connecting'); showChatInterface(true); try { let newConn = peer.connect(phone); if(!newConn) { updateContactStatus(id,'offline'); updateStatus(`❌ ${name} bağlanamadı`, true); return; } currentConnection=newConn; setupConnectionEvents(currentConnection,id,name); setTimeout(()=>{ if(currentConnection===newConn && !isConnected){ updateContactStatus(id,'offline'); setConnectedState(false); if(currentConnection===newConn) currentConnection=null; updateStatus(`⏰ ${name} zaman aşımı`, true); } },12000); } catch(e){ updateContactStatus(id,'offline'); updateStatus(`❌ bağlantı hatası`, true); } }
    function sendTextMessage() { if(!activeContactId||!isConnected||!currentConnection) { updateStatus('❌ Bağlantı yok', true); return; } let text = elements.messageInput.value.trim(); if(!text) return; try { currentConnection.send({ type:'text', text:text }); addMessageToHistory(activeContactId, text, 'Ben', true, 'text'); elements.messageInput.value=''; } catch(e){ queueMessage(activeContactId, { type:'text', content:text }); updateStatus('📦 Mesaj kuyruğa alındı', false); } }
    function queueMessage(cid, msg) { if(!pendingMessages[cid]) pendingMessages[cid]=[]; pendingMessages[cid].push(msg); addMessageToHistory(cid, `⏳ ${msg.content} (beklemede)`, 'Ben', true, 'text', null, null, true); }
    function flushPendingMessages(cid) { if(!pendingMessages[cid]?.length || !currentConnection || !isConnected || activeContactId!==cid) return; let pending = [...pendingMessages[cid]]; pendingMessages[cid]=[]; for(let m of pending) { try { currentConnection.send({ type:'text', text:m.content }); addMessageToHistory(cid, m.content, 'Ben', true, 'text'); } catch(e) { pendingMessages[cid].unshift(m); } } }
    function addMessageToHistory(cid, content, sender, isSent, type, file=null, mime='', isPending=false) { if(!messagesHistory[cid]) messagesHistory[cid]=[]; messagesHistory[cid].push({ content, sender, isSent, msgType:type, fileData:file, mime, isPending, timestamp:Date.now() }); saveMessagesHistory(); if(activeContactId===cid) renderMessagesForActiveContact(); if(!isSent && activeContactId!==cid) { unreadCounts[cid] = (unreadCounts[cid]||0)+1; renderSidebarContent(); } }
    function renderMessagesForActiveContact() { if(!elements.messagesArea) return; elements.messagesArea.innerHTML=''; if(!activeContactId) { elements.messagesArea.innerHTML='<div class="no-contact-selected">✨ Bir kişi seçin ✨</div>'; return; } let history = messagesHistory[activeContactId] || []; if(history.length===0) { elements.messagesArea.innerHTML='<div class="no-contact-selected">💬 İlk mesajı gönder</div>'; return; } history.forEach(msg=>{ let div=document.createElement('div'); div.className=`message ${msg.isSent?'sent':'received'}`; let timeStr=new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit', minute:'2-digit'}); let senderHtml=!msg.isSent?`<strong>${escapeHtml(msg.sender)}:</strong> `:''; let displayContent=escapeHtml(msg.content); div.innerHTML=`<div class="message-content">${senderHtml}${displayContent}</div><div class="message-time">${timeStr}</div>`; elements.messagesArea.appendChild(div); }); elements.messagesArea.scrollTop=elements.messagesArea.scrollHeight; if(unreadCounts[activeContactId]) delete unreadCounts[activeContactId]; renderSidebarContent(); applyTheme(currentTheme); }
    function updateChatHeaderStatus() { if(!activeContactId) { elements.currentChatHeader.style.display='none'; return; } elements.currentChatHeader.style.display='flex'; let status=contactStatus[activeContactId]||'offline'; let cls=status==='connected'?'online':(status==='connecting'?'connecting':'offline'); elements.chatStatusLight.className=`chat-status-light ${cls}`; }
    function updateContactStatus(id, st) { contactStatus[id]=st; renderSidebarContent(); updateChatHeaderStatus(); }
    function setConnectedState(conn) { isConnected=conn; if(elements.messageInput) elements.messageInput.disabled=!conn; if(elements.sendButton) elements.sendButton.disabled=!conn; updateChatHeaderStatus(); }
    function showChatInterface(show) { if(show && activeContactId) { elements.inputContainer.style.display='block'; elements.currentChatHeader.style.display='flex'; } else if(!activeContactId) { elements.inputContainer.style.display='none'; elements.currentChatHeader.style.display='none'; } }
    function saveContacts() { localStorage.setItem('seyficet_contacts_v3', JSON.stringify(contacts)); }
    function saveMessagesHistory() { localStorage.setItem('seyficet_messages_v3', JSON.stringify(messagesHistory)); }
    function loadContacts() { let stored = localStorage.getItem('seyficet_contacts_v3'); contacts = stored ? JSON.parse(stored) : []; contacts.forEach(c => { if(!contactStatus[c.id]) contactStatus[c.id]='offline'; if(!pendingMessages[c.id]) pendingMessages[c.id]=[]; }); renderSidebarContent(); }
    function loadMessagesHistory() { let stored = localStorage.getItem('seyficet_messages_v3'); messagesHistory = stored ? JSON.parse(stored) : {}; }
    
    function renderSidebarContent() {
        if(!elements.sidebarContent) return;
        if(currentSidebarMode === 'settings') {
            elements.sidebarTitle.innerText = '🎨 TEMA · AYARLAR';
            let themesHtml = `<div class="settings-section"><div class="settings-label">✨ GELİŞMİŞ TEMALAR ✨</div><div class="theme-grid">`;
            for(let [key, t] of Object.entries(THEMES)) {
                themesHtml += `<div class="theme-option" data-theme="${key}"><div class="theme-preview"><div class="theme-color-badge" style="background: ${key==='matrix'?'linear-gradient(135deg,#2E7D32,#1B5E20)':key==='neon_pulse'?'linear-gradient(135deg,#C026D3,#A21CAF)':key==='deep_ocean'?'linear-gradient(135deg,#1E88E5,#0D47A1)':key==='midnight_ember'?'linear-gradient(135deg,#E07C3C,#B45309)':'linear-gradient(135deg,#C084FC,#A855F7)'}"></div><span class="theme-name">${t.name}</span></div>${currentTheme===key?'<span class="theme-active-badge">✓ AKTİF</span>':''}</div>`;
            }
            themesHtml += `</div></div><div class="settings-section"><div class="settings-label">📞 KENDİ NUMARANIZ</div><div class="settings-value"><span>${myPhoneNumber && myPhoneNumber!=="" ? escapeHtml(myPhoneNumber) : "❌ Ayarlanmamış"}</span><button class="mini-btn primary" id="editPhoneSettingsBtn">${myPhoneNumber?"✏️ Değiştir":"➕ Ekle"}</button></div><div class="warning-text" style="color:#FACC15; font-size:0.6rem;">⚠️ Bağlantılar için geçerli telefon no</div></div><div class="settings-section"><div class="settings-label">🧹 SOYBET GEÇMİŞİ</div><div class="settings-value"><span style="flex:1;">Aktif kişinin mesajlarını sil</span><button class="mini-btn danger" id="clearHistorySettingsBtn">🗑️ Temizle</button></div></div>`;
            elements.sidebarContent.innerHTML = themesHtml;
            document.querySelectorAll('.theme-option').forEach(opt => opt.addEventListener('click', (e) => { let tk = opt.dataset.theme; if(tk) applyTheme(tk); renderSidebarContent(); }));
            document.getElementById('editPhoneSettingsBtn')?.addEventListener('click', ()=>document.getElementById('editPhoneModal').style.display='flex');
            document.getElementById('clearHistorySettingsBtn')?.addEventListener('click', ()=>{ if(activeContactId && confirm('Sohbet geçmişi silinsin?')){ messagesHistory[activeContactId]=[]; saveMessagesHistory(); renderMessagesForActiveContact(); updateStatus('🗑️ Geçmiş temizlendi'); } });
        } else {
            elements.sidebarTitle.innerText = '📇 KİŞİLER';
            let contactsHtml = '<div class="contacts-list-sidebar">';
            if(contacts.length===0) contactsHtml += '<div style="text-align:center; color:#CBD5E1;">📭 Henüz kişi yok</div>';
            else contacts.forEach(c => { let statusIcon = contactStatus[c.id]==='connected'?'● Çevrimiçi':(contactStatus[c.id]==='connecting'?'⟳ Bağlanıyor':'○ Çevrimdışı'); contactsHtml += `<div class="contact-item-sidebar"><div class="contact-clickable" data-id="${c.id}" data-phone="${c.phoneNumber}" data-name="${escapeHtml(c.name)}"><div class="contact-name-sidebar">${escapeHtml(c.name)} <span style="font-size:0.65rem; opacity:0.7;">${statusIcon}</span>${pendingMessages[c.id]?.length?`<span class="contact-badge">📬 ${pendingMessages[c.id].length}</span>`:''}${unreadCounts[c.id]?`<span class="contact-badge unread">🔔 ${unreadCounts[c.id]}</span>`:''}</div><div class="contact-phone-sidebar">📞 ${escapeHtml(c.phoneNumber)}</div></div><div class="edit-key" data-id="${c.id}" data-name="${escapeHtml(c.name)}" data-phone="${c.phoneNumber}">✏️</div></div>`; });
            contactsHtml += `<button class="add-contact-btn-sidebar" id="addContactSidebarBtn">+ Yeni Kişi Ekle</button></div>`;
            elements.sidebarContent.innerHTML = contactsHtml;
            document.querySelectorAll('.contact-clickable').forEach(el => { el.addEventListener('click', (e) => { connectToContact(el.dataset.id, el.dataset.phone, el.dataset.name); closeSidebar(); }); });
            document.querySelectorAll('.edit-key').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let c = contacts.find(c => c.id === btn.dataset.id); if(c) showEditContactModal(c.id, c.name, c.phoneNumber); }); });
            document.getElementById('addContactSidebarBtn')?.addEventListener('click', ()=>{ closeSidebar(); document.getElementById('contactModal').style.display='flex'; });
        }
    }
    function showEditContactModal(id, name, phone) { document.getElementById('editContactNameInput').value=name; document.getElementById('editContactPhoneInput').value=phone; let modal=document.getElementById('editContactModal'); modal.style.display='flex'; let saveHandler=()=>{ let newName=document.getElementById('editContactNameInput').value.trim(); let newPhone=document.getElementById('editContactPhoneInput').value.trim().replace(/\s/g,''); if(!newName||!newPhone) return; if(newPhone===myPhoneNumber){ alert('Kendi numaranız olamaz'); return; } let idx=contacts.findIndex(c=>c.id===id); if(idx!==-1){ contacts[idx].name=newName; contacts[idx].phoneNumber=newPhone; if(activeContactId===id){ activeContactName=newName; elements.currentChatName.innerText=newName; } saveContacts(); renderSidebarContent(); renderMessagesForActiveContact(); } modal.style.display='none'; cleanup(); }; let cancelHandler=()=>{ modal.style.display='none'; cleanup(); }; let cleanup=()=>{ document.getElementById('editContactSaveBtn').removeEventListener('click',saveHandler); document.getElementById('editContactCancelBtn').removeEventListener('click',cancelHandler); }; document.getElementById('editContactSaveBtn').addEventListener('click',saveHandler); document.getElementById('editContactCancelBtn').addEventListener('click',cancelHandler); }
    function closeSidebar() { elements.sidebar.classList.remove('open'); }
    elements.sendButton.onclick = sendTextMessage;
    elements.messageInput.onkeypress = (e) => { if(e.key==='Enter') sendTextMessage(); };
    elements.settingsBtn.onclick = () => { currentSidebarMode='settings'; renderSidebarContent(); elements.sidebar.classList.add('open'); };
    elements.contactsBtn.onclick = () => { currentSidebarMode='contacts'; renderSidebarContent(); elements.sidebar.classList.add('open'); };
    elements.closeSidebar.onclick = closeSidebar;
    document.getElementById('editPhoneSave').onclick = () => { let newPhone = document.getElementById('editPhoneInput').value.trim().replace(/\s/g,''); if(newPhone) { savePhoneNumber(newPhone); renderSidebarContent(); } document.getElementById('editPhoneModal').style.display='none'; };
    document.getElementById('editPhoneCancel').onclick = () => document.getElementById('editPhoneModal').style.display='none';
    document.getElementById('modalSaveBtn').onclick = () => { let name=document.getElementById('contactNameInput').value.trim(); let phone=document.getElementById('contactPhoneInput').value.trim().replace(/\s/g,''); if(!name||!phone) return; if(contacts.some(c=>c.phoneNumber===phone)) { alert('Zaten var'); return; } if(phone===myPhoneNumber){ alert('Kendi numaranızı ekleyemezsiniz'); return; } let newId=Date.now()+'_'+Math.random().toString(36); contacts.push({ id:newId, name, phoneNumber:phone }); contactStatus[newId]='offline'; pendingMessages[newId]=[]; saveContacts(); renderSidebarContent(); document.getElementById('contactModal').style.display='none'; };
    document.getElementById('modalCancelBtn').onclick = () => document.getElementById('contactModal').style.display='none';
    loadContacts(); loadMessagesHistory(); loadTheme(); 
    let hasPhone = loadPhoneNumber(); if(hasPhone) initPeer(); else updateStatus('⚠️ Ayarlardan telefon numaranızı girin', true);
    renderMessagesForActiveContact(); showChatInterface(false);
    window.renderSidebarContent = renderSidebarContent;
</script>
</body>
</html>
