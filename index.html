<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0B1120;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        /* Modern ana container */
        .app-wrapper {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: #0F172A;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: none;
            border-radius: 0;
        }

        /* Masaüstü görünümü - kart efekti */
        @media (min-width: 768px) {
            body {
                padding: 20px;
                background: linear-gradient(145deg, #0B1120 0%, #0F172A 100%);
            }
            .app-wrapper {
                height: auto;
                min-height: 0;
                max-width: 550px;
                width: 100%;
                margin: 0 auto;
                border-radius: 32px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(79, 114, 139, 0.1);
                background: #0F172A;
                overflow: hidden;
                transition: transform 0.2s ease;
            }
            .chat-container {
                border-radius: 32px;
                height: 85vh;
                max-height: 780px;
            }
        }

        @media (max-width: 767px) {
            .app-wrapper {
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
            }
            .chat-container {
                border-radius: 0;
            }
        }

        /* Header - Modern gradient + blur */
        .app-header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(71, 85, 105, 0.4);
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .header-text h2 {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.2;
            background: linear-gradient(135deg, #E2E8F0, #A78BFA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .sub-title {
            font-size: 0.6rem;
            opacity: 0.7;
            margin-top: 2px;
            font-weight: 500;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #E2E8F0;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 40px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .icon-btn:hover {
            background: rgba(139, 92, 246, 0.6);
            transform: scale(1.02);
        }

        /* Status bar - modern */
        .connection-bar {
            background: #1E293B;
            color: #94A3B8;
            padding: 6px 16px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(71,85,105,0.3);
        }
        .connection-bar.error {
            background: #7F1A1A;
            color: #FECACA;
        }
        .connection-bar.success {
            background: #14532D;
            color: #BBF7D0;
        }

        /* Aktif sohbet başlığı - modern glass */
        .current-chat-header {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.4);
            flex-shrink: 0;
        }
        .chat-contact-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .chat-status-light {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.2s;
            box-shadow: 0 0 6px currentColor;
        }
        .chat-status-light.online {
            background: #10B981;
            box-shadow: 0 0 8px #10B981;
        }
        .chat-status-light.offline { background: #475569; }
        .chat-status-light.connecting {
            background: #F59E0B;
            animation: pulse 1s infinite;
        }
        .chat-contact-name {
            font-weight: 700;
            font-size: 1.25rem;
            color: #F1F5F9;
            letter-spacing: -0.2px;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }
        .typing-badge-small {
            font-size: 0.7rem;
            color: #A78BFA;
            font-style: normal;
            font-weight: 500;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 30px;
            margin-left: 8px;
            animation: fadeIn 0.3s;
        }

        /* Mesaj alanı - yumuşak kaydırma */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            background: #0F172A;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        /* Özel scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1E293B;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: messageAppear 0.2s ease-out;
        }
        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-content {
            padding: 10px 16px;
            border-radius: 24px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.45;
            font-weight: 450;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .sent .message-content {
            background: linear-gradient(115deg, #8B5CF6 0%, #6D28D9 100%);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .received .message-content {
            background: #1E293B;
            color: #E2E8F0;
            border: 0.5px solid #334155;
            border-bottom-left-radius: 6px;
        }
        .message-time {
            font-size: 0.55rem;
            color: #64748B;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
            letter-spacing: 0.2px;
        }

        /* Input alanı - modern */
        .input-container {
            flex-shrink: 0;
            background: #0F172A;
            border-top: 1px solid #1E293B;
            padding: 12px 20px;
            backdrop-filter: blur(10px);
        }
        .message-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
        }
        #messageInput {
            flex: 1;
            min-width: 0;
            padding: 12px 18px;
            border: 1px solid #334155;
            border-radius: 40px;
            outline: none;
            font-size: 0.95rem;
            background: #1E293B;
            color: #F1F5F9;
            transition: all 0.2s;
        }
        #messageInput:focus {
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        #messageInput:disabled {
            opacity: 0.5;
            background: #0F172A;
        }
        #sendButton {
            flex-shrink: 0;
            padding: 10px 22px;
            background: linear-gradient(95deg, #8B5CF6, #6D28D9);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(139,92,246,0.3);
        }
        #sendButton:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #9B6DFF, #7C3AED);
        }
        #sendButton:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
        }

        /* Sidebar - Modern Glassmorphism */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 86%;
            max-width: 360px;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(24px);
            box-shadow: -8px 0 32px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-left: 1px solid rgba(139,92,246,0.3);
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar-header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            color: white;
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(139,92,246,0.3);
        }
        .sidebar-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #C084FC, #A78BFA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .close-sidebar {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #CBD5E1;
            font-size: 1.6rem;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-content {
            flex: 1;
            padding: 20px;
        }

        /* Ayarlar kartları */
        .settings-section {
            margin-bottom: 28px;
            background: rgba(30,41,59,0.5);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(71,85,105,0.4);
        }
        .settings-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #A78BFA;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .settings-value {
            background: #0F172A;
            padding: 12px 14px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            word-break: break-all;
        }
        .settings-value span {
            font-family: monospace;
            font-size: 0.85rem;
            color: #E2E8F0;
        }
        .mini-btn {
            background: #334155;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            color: #F1F5F9;
            transition: 0.2s;
        }
        .mini-btn.primary {
            background: #8B5CF6;
            color: white;
        }
        .mini-btn.danger {
            background: #991B1B;
            color: #FECACA;
        }
        .warning-text {
            font-size: 0.6rem;
            color: #F59E0B;
            margin-top: 8px;
            text-align: center;
        }

        /* Kişi listesi - modern kartlar */
        .contacts-list-sidebar {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .contact-item-sidebar {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
            transition: all 0.2s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
        }
        .contact-item-sidebar.active-contact {
            background: linear-gradient(115deg, #2D2A5E, #1E1A4A);
            border-left: 4px solid #8B5CF6;
            box-shadow: 0 8px 20px rgba(139,92,246,0.3);
        }
        .contact-info-sidebar {
            flex: 1;
        }
        .contact-name-sidebar {
            font-weight: 700;
            font-size: 1rem;
            color: #F1F5F9;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .contact-phone-sidebar {
            font-size: 0.65rem;
            color: #94A3B8;
            font-family: monospace;
            margin-top: 4px;
        }
        .contact-badge {
            font-size: 0.55rem;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: 600;
        }
        .contact-badge.online { background: #10B98120; color: #34D399; border: 0.5px solid #10B981; }
        .contact-badge.pending { background: #F59E0B20; color: #FBBF24; }
        .contact-badge.unread { background: #EF444420; color: #F87171; }
        .contact-actions-sidebar {
            display: flex;
            gap: 8px;
        }
        .contact-action-btn.edit-key {
            background: rgba(100, 116, 139, 0.2);
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #A78BFA;
        }
        .contact-clickable {
            cursor: pointer;
            transition: 0.15s;
        }
        .contact-clickable:active {
            transform: scale(0.97);
        }
        .add-contact-btn-sidebar {
            width: 100%;
            background: linear-gradient(95deg, #8B5CF6, #6D28D9);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 44px;
            font-weight: 700;
            margin-top: 24px;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 4px 14px rgba(139,92,246,0.4);
            transition: 0.2s;
        }

        /* Modallar - modern */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: #1E293B;
            width: 85%;
            max-width: 320px;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .modal-content h3 {
            color: #F1F5F9;
            margin-bottom: 12px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin: 12px 0;
            border: 1px solid #334155;
            border-radius: 44px;
            font-size: 0.9rem;
            background: #0F172A;
            color: #F1F5F9;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-save {
            background: #8B5CF6;
            color: white;
            flex: 1;
            padding: 10px;
            border-radius: 44px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .modal-cancel {
            background: #334155;
            color: #E2E8F0;
            flex: 1;
            border: none;
            border-radius: 44px;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .no-contact-selected {
            text-align: center;
            color: #64748B;
            padding: 48px 20px;
            font-size: 0.9rem;
            background: rgba(30,41,59,0.4);
            border-radius: 48px;
            margin: 20px;
            backdrop-filter: blur(4px);
        }
        .system-message {
            background: #1E293B;
            font-size: 0.7rem;
            text-align: center;
            padding: 6px 12px;
            border-radius: 30px;
            max-width: 80%;
            margin: 8px auto;
            color: #94A3B8;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="chat-container" id="chatContainer">
            <div class="app-header">
                <div class="logo-section">
                    <div class="logo-icon">✨</div>
                    <div class="header-text">
                        <h2>SEYFİÇET</h2>
                        <div class="sub-title">🔐 P2P · Private</div>
                    </div>
                </div>
                <div class="header-buttons">
                    <button class="icon-btn" id="settingsBtn">⚙️</button>
                    <button class="icon-btn" id="contactsBtn">👥</button>
                </div>
            </div>
            <div class="connection-bar" id="status">Başlatılıyor...</div>

            <div class="current-chat-header" id="currentChatHeader" style="display: none;">
                <div class="chat-contact-info">
                    <div class="chat-status-light" id="chatStatusLight"></div>
                    <span class="chat-contact-name" id="currentChatName">Seçili kişi yok</span>
                    <span id="chatTypingIndicator" style="display:none;" class="typing-badge-small">✍️ Yazıyor...</span>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="no-contact-selected">👈 Sağ üstten bir kişi seçin</div>
            </div>

            <div class="input-container" id="inputContainer" style="display: none;">
                <div class="message-input-row">
                    <input type="text" id="messageInput" placeholder="Mesaj yazın..." disabled>
                    <button id="sendButton" disabled>Gönder</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebarTitle">Ayarlar</h3>
            <button class="close-sidebar" id="closeSidebar">✕</button>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
    </div>

    <div id="contactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="contactNameInput" placeholder="Kişi adı">
            <input type="tel" id="contactPhoneInput" placeholder="Tel no: +905551234567">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="modalSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="editPhoneModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>📞 Telefon Numaranız</h3>
            <input type="tel" id="editPhoneInput" placeholder="+905551234567">
            <div class="warning-text">⚠️ Bu numara sizin kimliğinizdir.</div>
            <div class="modal-buttons">
                <button class="modal-cancel" id="editPhoneCancel">Vazgeç</button>
                <button class="modal-save" id="editPhoneSave">Kaydet</button>
            </div>
        </div>
    </div>
    
    <div id="editContactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>✏️ Kişi Düzenle</h3>
            <input type="text" id="editContactNameInput" placeholder="Yeni ad">
            <input type="tel" id="editContactPhoneInput" placeholder="Yeni telefon no">
            <div class="modal-buttons">
                <button class="modal-cancel" id="editContactCancelBtn">Vazgeç</button>
                <button class="modal-save" id="editContactSaveBtn">Güncelle</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ==================== KONFİG (Aynı mantık, tema yenilendi) ====================
        const PEER_CONFIG = {
            debug: 0,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun.stunprotocol.org:3478' }
                ]
            }
        };

        let myPhoneNumber = "";
        let peer = null;
        let currentConnection = null;
        let isConnected = false;
        let activeContactId = null;
        let activeContactName = "";
        let contacts = [];
        let messagesHistory = {};
        let pendingMessages = {};
        let contactStatus = {};
        let unreadCounts = {};
        let currentSidebarMode = 'settings';

        const elements = {
            statusDiv: document.getElementById('status'),
            messagesArea: document.getElementById('messagesArea'),
            messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton'),
            inputContainer: document.getElementById('inputContainer'),
            currentChatHeader: document.getElementById('currentChatHeader'),
            currentChatName: document.getElementById('currentChatName'),
            chatStatusLight: document.getElementById('chatStatusLight'),
            chatTypingIndicator: document.getElementById('chatTypingIndicator'),
            settingsBtn: document.getElementById('settingsBtn'),
            contactsBtn: document.getElementById('contactsBtn'),
            sidebar: document.getElementById('sidebar'),
            sidebarTitle: document.getElementById('sidebarTitle'),
            sidebarContent: document.getElementById('sidebarContent'),
            closeSidebar: document.getElementById('closeSidebar')
        };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }
        function showNotification(title, body) { if (Notification.permission === 'granted') new Notification(title, { body }); else if (Notification.permission !== 'denied') Notification.requestPermission(); }
        function updateStatus(message, isError = false, isSuccess = false) {
            elements.statusDiv.innerHTML = message;
            elements.statusDiv.classList.remove('error', 'success');
            if (isError) elements.statusDiv.classList.add('error');
            if (isSuccess) elements.statusDiv.classList.add('success');
        }

        function loadPhoneNumber() { let saved = localStorage.getItem('seyficet_phone'); if(saved && saved.trim() !== "") { myPhoneNumber = saved.trim(); return true; } myPhoneNumber = ""; return false; }
        function savePhoneNumber(phone) {
            if(!phone || phone.trim() === "") { myPhoneNumber = ""; localStorage.removeItem('seyficet_phone'); if(peer) peer.destroy(); peer = null; updateStatus('⚠️ Telefon numarası ayarlanmadı', true); return false; }
            let cleanPhone = phone.trim().replace(/\s/g, ''); myPhoneNumber = cleanPhone; localStorage.setItem('seyficet_phone', myPhoneNumber); initPeer(); return true;
        }

        function initPeer() {
            if(!myPhoneNumber) { updateStatus('⚠️ Lütfen ayarlardan telefon numaranızı girin', true); return; }
            if(peer) { peer.destroy(); peer = null; }
            updateStatus(`🔄 ${myPhoneNumber} bağlanıyor...`);
            try {
                peer = new Peer(myPhoneNumber, PEER_CONFIG);
                peer.on('open', (id) => updateStatus(`✅ ${id} aktif - Bağlantıya hazır`, false, true));
                peer.on('error', (err) => { if(err.type === 'unavailable-id') updateStatus(`❌ "${myPhoneNumber}" kullanımda! Farklı numara girin.`, true); else updateStatus(`⚠️ Bağlantı hatası`, true); });
                peer.on('connection', handleIncomingConnection);
                peer.on('disconnected', () => { updateStatus(`⚠️ Bağlantı kesildi, yeniden bağlanılıyor...`, true); setTimeout(() => { if(peer) peer.reconnect(); }, 2000); });
            } catch(e) { updateStatus(`❌ Başlatma hatası`, true); }
        }

        function handleIncomingConnection(incoming) {
            let contact = contacts.find(c => c.phoneNumber === incoming.peer);
            if(!contact) { incoming.close(); return; }
            if(currentConnection && isConnected) { incoming.close(); return; }
            if(currentConnection) currentConnection.close();
            currentConnection = incoming;
            activeContactId = contact.id;
            activeContactName = contact.name;
            elements.currentChatName.innerText = contact.name;
            setupConnectionEvents(currentConnection, contact.id, contact.name);
            updateContactStatus(contact.id, 'connected');
            setConnectedState(true);
            updateStatus(`✅ ${contact.name} ile bağlantı kuruldu`, false, true);
            flushPendingMessages(contact.id);
            showChatInterface(true);
            renderMessagesForActiveContact();
            renderSidebarContent();
        }

        function setupConnectionEvents(connection, contactId, contactName) { /* (kısaltılmış ama önceki mantık korunur) */
            connection.on('open', () => { if(activeContactId === contactId) { isConnected = true; setConnectedState(true); updateContactStatus(contactId, 'connected'); flushPendingMessages(contactId); } });
            let typingTimeout = null;
            connection.on('data', (data) => {
                if(activeContactId === contactId && currentConnection === connection) {
                    if(data.type === 'text') addMessageToHistory(contactId, data.text, contactName, false, 'text');
                    else if(data.type === 'typing') { elements.chatTypingIndicator.style.display = 'inline-block'; if(typingTimeout) clearTimeout(typingTimeout); typingTimeout = setTimeout(() => elements.chatTypingIndicator.style.display = 'none', 2000); }
                }
            });
            connection.on('close', () => { if(activeContactId === contactId && currentConnection === connection) { updateContactStatus(contactId, 'offline'); setConnectedState(false); currentConnection = null; isConnected = false; updateStatus(`❌ ${contactName} ile bağlantı kesildi`); } });
        }

        function connectToContact(id, phoneNumber, name) {
            if(!myPhoneNumber) { alert('Önce kendi numaranızı girin.'); return; }
            if(activeContactId === id && isConnected) return;
            if(currentConnection) { currentConnection.close(); currentConnection = null; isConnected = false; }
            activeContactId = id; activeContactName = name; elements.currentChatName.innerText = name; updateChatHeaderStatus(); renderMessagesForActiveContact(); updateContactStatus(id, 'connecting'); showChatInterface(true);
            try {
                let newConn = peer.connect(phoneNumber);
                if(!newConn) { updateContactStatus(id, 'offline'); updateStatus(`❌ ${name} bağlanamadı`, true); return; }
                currentConnection = newConn; setupConnectionEvents(currentConnection, id, name);
                setTimeout(() => { if(currentConnection === newConn && !isConnected) { updateContactStatus(id, 'offline'); setConnectedState(false); if(currentConnection === newConn) currentConnection = null; updateStatus(`⏰ ${name} bağlantı zaman aşımı`, true); } }, 15000);
            } catch(e) { updateContactStatus(id, 'offline'); updateStatus(`❌ Bağlantı hatası`, true); }
        }

        function sendTextMessage() { if(!activeContactId) return; let text = elements.messageInput.value.trim(); if(!text) return; sendMessageNow(activeContactId, 'text', text); elements.messageInput.value = ''; }
        function sendMessageNow(contactId, type, content) {
            if(activeContactId === contactId && isConnected && currentConnection) { try { currentConnection.send({ type: 'text', text: content }); addMessageToHistory(contactId, content, 'Ben', true, 'text'); return true; } catch(e) { queueMessage(contactId, { type, content }); return false; } }
            else { queueMessage(contactId, { type, content }); return false; }
        }
        function queueMessage(contactId, msg) { if(!pendingMessages[contactId]) pendingMessages[contactId] = []; pendingMessages[contactId].push(msg); addMessageToHistory(contactId, `⏳ ${msg.content} (beklemede)`, 'Ben', true, 'text', null, null, true); }
        function flushPendingMessages(contactId) { if(!pendingMessages[contactId]?.length || !currentConnection || !isConnected || activeContactId !== contactId) return; let pending = [...pendingMessages[contactId]]; pendingMessages[contactId] = []; for(let msg of pending) { try { currentConnection.send({ type: 'text', text: msg.content }); addMessageToHistory(contactId, msg.content, 'Ben', true, 'text'); } catch(err) { pendingMessages[contactId].unshift(msg); } } }
        function addMessageToHistory(contactId, content, sender, isSent, msgType, fileData=null, mime='', isPending=false) { if(!messagesHistory[contactId]) messagesHistory[contactId]=[]; messagesHistory[contactId].push({ content, sender, isSent, msgType, fileData, mime, isPending, timestamp:Date.now() }); saveMessagesHistory(); if(activeContactId===contactId) renderMessagesForActiveContact(); if(!isSent && activeContactId!==contactId) { unreadCounts[contactId] = (unreadCounts[contactId]||0)+1; renderSidebarContent(); showNotification(sender, content.length>30?content.substring(0,30)+'...':content); } }
        function renderMessagesForActiveContact() { if(!elements.messagesArea) return; elements.messagesArea.innerHTML = ''; if(!activeContactId) { elements.messagesArea.innerHTML = '<div class="no-contact-selected">👈 Sağ üstten bir kişi seçin</div>'; return; } let history = messagesHistory[activeContactId] || []; if(history.length===0) { elements.messagesArea.innerHTML = '<div class="no-contact-selected">💬 Henüz mesaj yok</div>'; return; } history.forEach((msg) => { let div = document.createElement('div'); div.className = `message ${msg.isSent ? 'sent' : 'received'}`; let timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); let senderName = !msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''; let contentDisplay = msg.msgType === 'text' ? escapeHtml(msg.content) : (msg.isPending ? msg.content : msg.content); div.innerHTML = `<div class="message-content">${senderName}${contentDisplay}</div><div class="message-time">${timeStr}</div>`; elements.messagesArea.appendChild(div); }); elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight; if(unreadCounts[activeContactId]) { delete unreadCounts[activeContactId]; renderSidebarContent(); } }
        function updateChatHeaderStatus() { if(!activeContactId) { elements.currentChatHeader.style.display = 'none'; return; } elements.currentChatHeader.style.display = 'flex'; let status = contactStatus[activeContactId]||'offline'; let statusClass = status==='connected'?'online':(status==='connecting'?'connecting':'offline'); elements.chatStatusLight.className = `chat-status-light ${statusClass}`; }
        function updateContactStatus(id, status) { contactStatus[id]=status; renderSidebarContent(); updateChatHeaderStatus(); }
        function setConnectedState(connected) { isConnected = connected; if(elements.messageInput) elements.messageInput.disabled = !connected; if(elements.sendButton) elements.sendButton.disabled = !connected; updateChatHeaderStatus(); }
        function showChatInterface(show) { if(show && activeContactId) { elements.inputContainer.style.display = 'block'; elements.currentChatHeader.style.display = 'flex'; } else if(!activeContactId) { elements.inputContainer.style.display = 'none'; elements.currentChatHeader.style.display = 'none'; } }

        let editingContactId = null;
        function showEditContactModal(contactId, currentName, currentPhone) { editingContactId = contactId; const modal = document.getElementById('editContactModal'); document.getElementById('editContactNameInput').value = currentName; document.getElementById('editContactPhoneInput').value = currentPhone; modal.style.display = 'flex'; const saveHandler = () => { let newName = document.getElementById('editContactNameInput').value.trim(); let newPhone = document.getElementById('editContactPhoneInput').value.trim().replace(/\s/g,''); if(!newName||!newPhone) { alert('Ad ve telefon gerekli'); return; } if(newPhone===myPhoneNumber) { alert('Kendi numaranızı ekleyemezsiniz'); return; } if(contacts.some(c=>c.id!==contactId && c.phoneNumber===newPhone)) { alert('Bu numara başka kişide kayıtlı'); return; } let idx = contacts.findIndex(c=>c.id===contactId); if(idx!==-1){ contacts[idx].name=newName; contacts[idx].phoneNumber=newPhone; if(activeContactId===contactId){ activeContactName=newName; elements.currentChatName.innerText=newName; } saveContacts(); renderSidebarContent(); renderMessagesForActiveContact(); } modal.style.display='none'; cleanup(); }; const cancelHandler = () => { modal.style.display='none'; cleanup(); }; const cleanup = () => { document.getElementById('editContactSaveBtn').removeEventListener('click', saveHandler); document.getElementById('editContactCancelBtn').removeEventListener('click', cancelHandler); }; document.getElementById('editContactSaveBtn').addEventListener('click', saveHandler); document.getElementById('editContactCancelBtn').addEventListener('click', cancelHandler); }
        function renderSidebarContent() { if(!elements.sidebarContent) return; if(currentSidebarMode==='settings') { elements.sidebarTitle.innerText = '⚙️ Ayarlar'; elements.sidebarContent.innerHTML = `<div class="settings-section"><div class="settings-label">📞 TELEFON NUMARANIZ</div><div class="settings-value"><span>${myPhoneNumber && myPhoneNumber!=="" ? escapeHtml(myPhoneNumber) : "Henüz ayarlanmadı"}</span><button class="mini-btn primary" id="editPhoneSettingsBtn">${myPhoneNumber?"✏️ Düzenle":"➕ Ekle"}</button></div><div class="warning-text">⚠️ Bu numara sizin kimliğinizdir.</div></div><hr><div class="settings-section"><div class="settings-label">🗑️ SOHBET GEÇMİŞİ</div><div class="settings-value"><span>Aktif sohbetin mesajlarını siler</span><button class="mini-btn danger" id="clearHistorySettingsBtn">🧹 Temizle</button></div></div>`; document.getElementById('editPhoneSettingsBtn')?.addEventListener('click', ()=>document.getElementById('editPhoneModal').style.display='flex'); document.getElementById('clearHistorySettingsBtn')?.addEventListener('click', ()=>{ if(activeContactId && confirm('Mesajlar silinsin mi?')){ messagesHistory[activeContactId]=[]; saveMessagesHistory(); renderMessagesForActiveContact(); updateStatus('Sohbet temizlendi'); } }); } else { elements.sidebarTitle.innerText = '📒 Kişilerim'; let contactsHtml = '<div class="contacts-list-sidebar">'; if(contacts.length===0) contactsHtml += '<div style="text-align:center; color:#64748b;">📭 Henüz kişi yok</div>'; else contacts.forEach(c => { let status = contactStatus[c.id]||'offline'; let isOnline = status === 'connected'; contactsHtml += `<div class="contact-item-sidebar ${activeContactId===c.id?'active-contact':''}" data-contact-id="${c.id}"><div class="contact-info-sidebar contact-clickable" data-id="${c.id}" data-phone="${c.phoneNumber}" data-name="${escapeHtml(c.name)}"><div class="contact-name-sidebar">${escapeHtml(c.name)}${isOnline?'<span class="contact-badge online">● Çevrimiçi</span>':''}${pendingMessages[c.id]?.length?`<span class="contact-badge pending">📬 ${pendingMessages[c.id].length}</span>`:''}${unreadCounts[c.id]?`<span class="contact-badge unread">🔔 ${unreadCounts[c.id]}</span>`:''}</div><div class="contact-phone-sidebar">📞 ${escapeHtml(c.phoneNumber)}</div></div><div class="contact-actions-sidebar"><button class="contact-action-btn edit-key" data-id="${c.id}" data-name="${escapeHtml(c.name)}" data-phone="${c.phoneNumber}">🔧</button></div></div>`; }); contactsHtml += `<button class="add-contact-btn-sidebar" id="addContactSidebarBtn">+ Yeni Kişi Ekle</button></div>`; elements.sidebarContent.innerHTML = contactsHtml; document.querySelectorAll('.contact-clickable').forEach(el=>{ el.addEventListener('click',(e)=>{ e.stopPropagation(); connectToContact(el.dataset.id, el.dataset.phone, el.dataset.name); closeSidebar(); }); }); document.querySelectorAll('.edit-key').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); let c = contacts.find(c=>c.id === btn.dataset.id); if(c) showEditContactModal(c.id, c.name, c.phoneNumber); }); }); document.getElementById('addContactSidebarBtn')?.addEventListener('click',()=>{ closeSidebar(); document.getElementById('contactModal').style.display='flex'; }); } }
        function showAddContactLogic() { const modal = document.getElementById('contactModal'); const nameInput = document.getElementById('contactNameInput'); const phoneInput = document.getElementById('contactPhoneInput'); nameInput.value=''; phoneInput.value=''; modal.style.display='flex'; const saveHandler = () => { let name = nameInput.value.trim(); let phone = phoneInput.value.trim().replace(/\s/g,''); if(!name||!phone) { alert('Tüm alanlar gerekli'); return; } if(contacts.some(c=>c.phoneNumber===phone)) { alert('Bu numara zaten var'); return; } if(phone===myPhoneNumber) { alert('Kendi numaranızı ekleyemezsiniz'); return; } let newId = Date.now()+'_'+Math.random().toString(36); contacts.push({ id:newId, name, phoneNumber:phone }); contactStatus[newId]='offline'; pendingMessages[newId]=[]; saveContacts(); renderSidebarContent(); modal.style.display='none'; cleanup(); }; const cancelHandler = () => { modal.style.display='none'; cleanup(); }; const cleanup = () => { document.getElementById('modalSaveBtn').removeEventListener('click', saveHandler); document.getElementById('modalCancelBtn').removeEventListener('click', cancelHandler); }; document.getElementById('modalSaveBtn').addEventListener('click', saveHandler); document.getElementById('modalCancelBtn').addEventListener('click', cancelHandler); }
        function saveContacts() { localStorage.setItem('seyficet_contacts_v2', JSON.stringify(contacts)); }
        function saveMessagesHistory() { localStorage.setItem('seyficet_messages_v2', JSON.stringify(messagesHistory)); }
        function loadContacts() { let stored = localStorage.getItem('seyficet_contacts_v2'); contacts = stored ? JSON.parse(stored) : []; contacts.forEach(c => { if(!contactStatus[c.id]) contactStatus[c.id]='offline'; if(!pendingMessages[c.id]) pendingMessages[c.id]=[]; }); renderSidebarContent(); }
        function loadMessagesHistory() { let stored = localStorage.getItem('seyficet_messages_v2'); messagesHistory = stored ? JSON.parse(stored) : {}; }
        elements.sendButton.onclick = sendTextMessage;
        elements.messageInput.onkeypress = (e) => { if(e.key==='Enter') sendTextMessage(); };
        elements.settingsBtn.onclick = () => { currentSidebarMode='settings'; renderSidebarContent(); elements.sidebar.classList.add('open'); };
        elements.contactsBtn.onclick = () => { currentSidebarMode='contacts'; renderSidebarContent(); elements.sidebar.classList.add('open'); };
        elements.closeSidebar.onclick = () => elements.sidebar.classList.remove('open');
        function closeSidebar() { elements.sidebar.classList.remove('open'); }
        if(Notification.permission==='default') Notification.requestPermission();
        loadContacts(); loadMessagesHistory(); const hasPhone = loadPhoneNumber(); if(hasPhone) initPeer(); else updateStatus('⚠️ Lütfen ayarlardan telefon numaranızı girin', true);
        renderMessagesForActiveContact(); showChatInterface(false);
        document.getElementById('editPhoneSave').onclick = () => { let newPhone = document.getElementById('editPhoneInput').value.trim().replace(/\s/g,''); if(newPhone) savePhoneNumber(newPhone); document.getElementById('editPhoneModal').style.display='none'; renderSidebarContent(); };
        document.getElementById('editPhoneCancel').onclick = () => document.getElementById('editPhoneModal').style.display='none';
        document.getElementById('modalSaveBtn').onclick = () => showAddContactLogic();
        document.getElementById('modalCancelBtn').onclick = () => document.getElementById('contactModal').style.display='none';
    </script>
</body>
</html>
