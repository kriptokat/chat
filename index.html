<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - Telefonla P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 800px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
        }

        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            font-size: 1.6rem;
        }
        .header-text h2 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .settings-icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        .settings-icon-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(0.96);
        }

        /* Telefon numarası - küçük punto, başlıksız */
        .my-phone-mini {
            background: #f1f5f9;
            padding: 6px 16px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        .my-phone-mini span {
            font-family: monospace;
            font-size: 0.7rem;
            color: #475569;
            font-weight: 500;
        }
        .copy-phone-mini {
            background: none;
            border: none;
            font-size: 0.65rem;
            color: #4a90e2;
            margin-left: 8px;
            cursor: pointer;
        }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 6px 12px;
            text-align: center;
            flex-shrink: 0;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .current-chat-info {
            padding: 8px 14px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .current-chat-name { color: #4a90e2; font-weight: 700; }
        .typing-indicator {
            font-size: 0.6rem;
            color: #4a90e2;
            padding: 2px 10px;
            font-style: italic;
            background: #eef2ff;
            border-radius: 20px;
            display: inline-block;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; align-items: flex-start; }

        .message-content {
            padding: 8px 12px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .sent .message-content { background: #4a90e2; color: white; border-bottom-right-radius: 4px; }
        .received .message-content { background: white; color: #1e293b; border: 0.5px solid #e2e8f0; border-bottom-left-radius: 4px; }

        .read-status {
            font-size: 0.5rem;
            margin-top: 2px;
            margin-right: 4px;
            color: #64748b;
        }
        .sent .read-status { color: #cbd5e1; }
        .read-status.read { color: #22c55e; }

        .input-container {
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #edf2f7;
            padding: 10px 12px;
        }
        .message-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            outline: none;
            font-size: 0.85rem;
        }
        #messageInput:focus { border-color: #4a90e2; }
        #sendButton {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }
        #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-buttons-row { display: flex; gap: 10px; }
        .action-icon-btn {
            background: #f1f5f9;
            border: none;
            padding: 6px 16px;
            border-radius: 28px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* AYARLAR MENÜSÜ - Açılır Kutu (Dropdown) */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .settings-dropdown {
            background: white;
            width: 90%;
            max-width: 380px;
            max-height: 85vh;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            animation: slideUp 0.2s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .settings-dropdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .settings-dropdown-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-settings {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-dropdown-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        /* Telefon ayarı bölümü */
        .phone-settings-simple {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 20px;
        }
        .phone-settings-simple label {
            font-size: 0.7rem;
            color: #64748b;
            display: block;
            margin-bottom: 6px;
        }
        .phone-input-flex {
            display: flex;
            gap: 8px;
        }
        .phone-input-flex input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.8rem;
            font-family: monospace;
        }
        .save-phone-small {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .current-phone-small {
            font-size: 0.7rem;
            font-family: monospace;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
        }
        
        /* Kişilerim Listesi - Açılır Kutu İçinde */
        .contacts-section {
            margin-top: 8px;
        }
        .section-mini-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .contacts-list-dropdown {
            background: #f8fafc;
            border-radius: 20px;
            overflow: hidden;
            max-height: 320px;
            overflow-y: auto;
        }
        .contact-dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: background 0.15s;
        }
        .contact-dropdown-item:hover {
            background: #f1f5f9;
        }
        .contact-dropdown-item.active {
            background: #eef2ff;
            border-left: 3px solid #4a90e2;
        }
        .contact-info-flex {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .contact-number-circle {
            background: #e2e8f0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: #475569;
        }
        .contact-details {
            flex: 1;
        }
        .contact-name-small {
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .contact-phone-small {
            font-size: 0.6rem;
            color: #64748b;
            font-family: monospace;
            margin-top: 2px;
        }
        .status-dot-small {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-dot-small.online { background: #22c55e; }
        .status-dot-small.offline { background: #ef4444; }
        .status-dot-small.connecting { background: #eab308; animation: pulse 1s infinite; }
        .badge-mini {
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .online-badge-mini { background: #22c55e20; color: #166534; }
        .pending-badge-mini { background: #f9731620; color: #c2410c; }
        .unread-badge-mini { background: #ef444420; color: #dc2626; }
        .delete-contact-icon {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            color: #94a3b8;
        }
        .delete-contact-icon:hover {
            background: #fee2e2;
            color: #dc2626;
        }
        .add-contact-btn-dropdown {
            width: 100%;
            background: #eef2ff;
            border: none;
            padding: 10px;
            border-radius: 28px;
            color: #4a90e2;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        .empty-contacts-small {
            text-align: center;
            padding: 24px;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .emoji-picker {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: white;
            border-radius: 24px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            z-index: 1000;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.25);
        }
        .emoji-picker span { font-size: 1.5rem; cursor: pointer; text-align: center; padding: 4px; }

        .message-image { max-width: 180px; max-height: 180px; border-radius: 12px; cursor: pointer; }
        .file-message { cursor: pointer; text-decoration: underline; }
        .system-msg { background: #eef2ff; font-size: 0.65rem; text-align: center; padding: 4px 10px; border-radius: 16px; color: #475569; }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        @media (max-width: 500px) {
            body { padding: 0; }
            .chat-container { max-width: 100%; height: 100vh; max-height: none; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <!-- Üst Alan: Logo + Sağda Ayarlar İkonu -->
        <div class="app-header">
            <div class="logo-area">
                <div class="logo-icon">💬</div>
                <div class="header-text">
                    <h2>SEYFİÇET</h2>
                </div>
            </div>
            <button class="settings-icon-btn" id="settingsIconBtn">⚙️</button>
        </div>
        
        <!-- Telefon numarası - küçük punto, başlıksız, tek satır -->
        <div class="my-phone-mini">
            <span id="miniPhoneDisplay">Numara ayarlanmamış</span>
            <button class="copy-phone-mini" id="copyMiniPhoneBtn">📋 Kopyala</button>
        </div>
        
        <!-- Durum çubuğu -->
        <div class="chat-header" id="statusBar">
            ✅ Hazır
        </div>
        
        <!-- Aktif sohbet bilgisi -->
        <div class="current-chat-info">
            💬 Sohbet: <span id="activeContactName" class="current-chat-name">Seçili kişi yok</span>
            <span id="typingIndicator" style="display:none;" class="typing-indicator">✍️ Yazıyor...</span>
        </div>
        
        <!-- Mesaj alanı - esnek, taşmaz -->
        <div class="messages-area" id="messagesArea"></div>
        
        <!-- Mesaj giriş alanı - altta sabit -->
        <div class="input-container">
            <div class="message-input-row">
                <input type="text" id="messageInput" placeholder="Mesaj yazın veya dosya sürükleyin..." disabled>
                <button id="sendButton" disabled>Gönder</button>
            </div>
            <div class="action-buttons-row">
                <button class="action-icon-btn" id="emojiBtn">😊 Emoji</button>
                <button class="action-icon-btn" id="fileBtn">📎 Dosya</button>
                <button class="action-icon-btn" id="imageBtn">🖼️ Resim</button>
            </div>
        </div>
    </div>

    <!-- AYARLAR AÇILIR KUTU (İçinde Kişilerim Listesi) -->
    <div id="settingsDropdown" style="display: none;" class="settings-overlay">
        <div class="settings-dropdown">
            <div class="settings-dropdown-header">
                <h3>⚙️ Ayarlar</h3>
                <button class="close-settings" id="closeSettingsBtn">✕</button>
            </div>
            <div class="settings-dropdown-body">
                <!-- Telefon Numarası Ayarları -->
                <div class="phone-settings-simple">
                    <label>📱 Telefon Numaranız (Kimlik)</label>
                    <div class="phone-input-flex">
                        <input type="tel" id="settingsPhoneInput" placeholder="Örn: 905551234567">
                        <button class="save-phone-small" id="savePhoneBtn">Kaydet</button>
                    </div>
                    <div style="margin-top: 6px;">
                        <span class="current-phone-small" id="currentPhoneDisplay">-</span>
                    </div>
                </div>

                <!-- Kişilerim Listesi Bölümü -->
                <div class="contacts-section">
                    <div class="section-mini-title">📒 KİŞİLERİM</div>
                    <div class="contacts-list-dropdown" id="contactsListDropdown">
                        <div class="empty-contacts-small">📭 Henüz kişi eklenmemiş</div>
                    </div>
                    <button class="add-contact-btn-dropdown" id="addContactDropdownBtn">
                        ➕ Yeni Kişi Ekle
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- YENİ KİŞİ EKLEME MODALI -->
    <div id="addContactModal" style="display: none;" class="settings-overlay">
        <div class="settings-dropdown" style="max-width: 340px;">
            <div class="settings-dropdown-header">
                <h3>➕ Yeni Kişi</h3>
                <button class="close-settings" id="closeAddModalBtn">✕</button>
            </div>
            <div class="settings-dropdown-body">
                <input type="text" id="newContactName" placeholder="Kişi adı" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:28px; margin-bottom:12px;">
                <input type="tel" id="newContactPhone" placeholder="Telefon Numarası" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:28px; margin-bottom:20px;">
                <button class="save-phone-small" id="confirmAddBtn" style="width:100%; padding:12px;">Ekle</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ---------- UYGULAMA ----------
        let myPhoneNumber = null;
        let peer, currentConnection, isConnected = false;
        let activeContactId = null, activeContactName = "";
        let contacts = [], messagesHistory = {}, pendingMessages = {}, contactStatus = {}, unreadCounts = {};
        let emojiPicker = null;
        
        // DOM Elemanları
        const dom = {
            miniPhoneDisplay: document.getElementById('miniPhoneDisplay'),
            copyMiniPhoneBtn: document.getElementById('copyMiniPhoneBtn'),
            statusBar: document.getElementById('statusBar'),
            activeContactNameSpan: document.getElementById('activeContactName'),
            typingIndicator: document.getElementById('typingIndicator'),
            messagesArea: document.getElementById('messagesArea'),
            messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton'),
            emojiBtn: document.getElementById('emojiBtn'),
            fileBtn: document.getElementById('fileBtn'),
            imageBtn: document.getElementById('imageBtn'),
            settingsIconBtn: document.getElementById('settingsIconBtn'),
            settingsDropdown: document.getElementById('settingsDropdown'),
            closeSettingsBtn: document.getElementById('closeSettingsBtn'),
            settingsPhoneInput: document.getElementById('settingsPhoneInput'),
            savePhoneBtn: document.getElementById('savePhoneBtn'),
            currentPhoneDisplay: document.getElementById('currentPhoneDisplay'),
            contactsListDropdown: document.getElementById('contactsListDropdown'),
            addContactDropdownBtn: document.getElementById('addContactDropdownBtn'),
            addContactModal: document.getElementById('addContactModal'),
            closeAddModalBtn: document.getElementById('closeAddModalBtn'),
            newContactName: document.getElementById('newContactName'),
            newContactPhone: document.getElementById('newContactPhone'),
            confirmAddBtn: document.getElementById('confirmAddBtn')
        };
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function showNotification(title, body) { if(Notification.permission === 'granted') new Notification(title, {body}); else if(Notification.permission !== 'denied') Notification.requestPermission(); }
        
        // Telefon numarası işlemleri
        function savePhoneNumber(phone) {
            let cleaned = phone.replace(/\s/g, '');
            if(!cleaned) return false;
            localStorage.setItem('p2p_my_phone', cleaned);
            myPhoneNumber = cleaned;
            dom.miniPhoneDisplay.textContent = myPhoneNumber;
            dom.currentPhoneDisplay.textContent = myPhoneNumber;
            return true;
        }
        function getStoredPhone() { return localStorage.getItem('p2p_my_phone'); }
        
        // PeerJS başlat
        function initPeerWithPhone(phone) {
            if(peer && !peer.destroyed) peer.destroy();
            peer = new Peer(phone, { debug: 0, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
            peer.on('open', () => {
                dom.statusBar.innerHTML = `✅ ${myPhoneNumber} aktif - P2P hazır`;
            });
            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') {
                    dom.statusBar.innerHTML = `⚠️ Bu numara kullanımda. Ayarlardan değiştirin.`;
                    openSettingsDropdown();
                } else {
                    dom.statusBar.innerHTML = `⚠️ Hata: ${err.type}`;
                }
            });
            peer.on('connection', handleIncoming);
        }
        
        function openSettingsDropdown() {
            renderContactsInDropdown();
            dom.settingsPhoneInput.value = myPhoneNumber || '';
            dom.settingsDropdown.style.display = 'flex';
        }
        
        function changePhoneNumber(newPhone) {
            if(!newPhone || newPhone === myPhoneNumber) return false;
            if(currentConnection) { try { currentConnection.close(); } catch(e) {} }
            currentConnection = null; isConnected = false; activeContactId = null; activeContactName = "";
            if(peer && !peer.destroyed) peer.destroy();
            savePhoneNumber(newPhone);
            // Verileri sıfırla (farklı kimlik olduğu için)
            contacts = []; messagesHistory = {}; pendingMessages = {}; contactStatus = {}; unreadCounts = {};
            saveContacts(); saveMessages();
            updateActiveDisplay();
            renderMessages();
            initPeerWithPhone(myPhoneNumber);
            return true;
        }
        
        // Mesaj gönderme
        function sendMessageWithQueue(contactId, type, content, fileData=null, mime='', fileName='') {
            if(!contactId) return false;
            const isNow = (activeContactId === contactId && isConnected && currentConnection);
            if(isNow) {
                try {
                    let msg = { type };
                    if(type === 'text') msg.text = content;
                    else { msg.name = fileName; msg.data = fileData; msg.mime = mime; }
                    currentConnection.send(msg);
                    addToHistory(contactId, content || fileName, 'Ben', true, type, fileData, mime);
                    return true;
                } catch(e) { queueMsg(contactId, {type, content, fileData, mime, name: fileName}); return false; }
            } else { queueMsg(contactId, {type, content, fileData, mime, name: fileName}); return false; }
        }
        
        function queueMsg(contactId, msg) {
            if(!pendingMessages[contactId]) pendingMessages[contactId]=[];
            pendingMessages[contactId].push(msg);
            if(contactStatus[contactId] !== 'connected') updateContactStatus(contactId,'pending');
            addToHistory(contactId, `⏳ ${msg.content || msg.name} (beklemede)`, 'Ben', true, msg.type, msg.fileData, msg.mime, true);
        }
        
        function flushPending(contactId) {
            if(!pendingMessages[contactId]?.length || !currentConnection || !isConnected || activeContactId !== contactId) return;
            let pending = [...pendingMessages[contactId]];
            pendingMessages[contactId]=[];
            for(let msg of pending) {
                try {
                    let payload={type:msg.type};
                    if(msg.type==='text') payload.text=msg.content;
                    else {payload.name=msg.name; payload.data=msg.fileData; payload.mime=msg.mime;}
                    currentConnection.send(payload);
                    addToHistory(contactId, msg.content||msg.name, 'Ben', true, msg.type, msg.fileData, msg.mime);
                } catch(e){ if(!pendingMessages[contactId]) pendingMessages[contactId]=[]; pendingMessages[contactId].unshift(msg); }
            }
            addSystemMessage(`${pending.length} bekleyen mesaj gönderildi.`);
            updateContactStatus(contactId,'connected');
        }
        
        function addToHistory(contactId, content, sender, isSent, msgType, fileData=null, mime='', isPending=false) {
            if(!messagesHistory[contactId]) messagesHistory[contactId]=[];
            messagesHistory[contactId].push({content, sender, isSent, msgType, fileData, mime, isPending, read: isSent, timestamp: Date.now()});
            saveMessages();
            if(activeContactId===contactId) renderMessages();
            if(!isSent && activeContactId!==contactId) {
                unreadCounts[contactId]=(unreadCounts[contactId]||0)+1;
                if(Notification.permission==='granted') showNotification(sender, content.length>30?content.substring(0,30)+'...':content);
            }
        }
        
        function updateContactStatus(id, status) { contactStatus[id]=status; }
        
        function setupConnection(conn, contactId, contactName) {
            conn.on('open', () => {
                if(activeContactId===contactId) {
                    isConnected=true; setConnectedState(true);
                    updateContactStatus(contactId,'connected');
                    dom.statusBar.innerHTML = `✅ ${contactName} ile bağlantı aktif`;
                    addSystemMessage(`${contactName} ile görüşmeye hazırsınız.`);
                    flushPending(contactId);
                }
            });
            let typingTimer;
            conn.on('data', (data) => {
                if(activeContactId===contactId && currentConnection===conn) {
                    if(data.type==='text') addToHistory(contactId, data.text, contactName, false, 'text');
                    else if(data.type==='file'||data.type==='image') addToHistory(contactId, data.name, contactName, false, data.type, data.data, data.mime);
                    else if(data.type==='typing') {
                        dom.typingIndicator.style.display='inline-block';
                        clearTimeout(typingTimer);
                        typingTimer=setTimeout(()=>dom.typingIndicator.style.display='none',2000);
                    }
                }
            });
            conn.on('close', () => {
                if(activeContactId===contactId && currentConnection===conn) {
                    addSystemMessage(`${contactName} bağlantıyı kapattı.`);
                    updateContactStatus(contactId,'offline');
                    setConnectedState(false);
                    currentConnection=null; isConnected=false;
                    dom.statusBar.innerHTML = `⚠️ ${contactName} ile bağlantı kesildi`;
                }
            });
        }
        
        function selectAndConnect(contactId, phone, name) {
            if(activeContactId === contactId && isConnected) return;
            if(currentConnection) disconnectCurrent();
            activeContactId = contactId; activeContactName = name;
            dom.activeContactNameSpan.innerText = name;
            renderMessages();
            updateContactStatus(contactId, 'connecting');
            dom.statusBar.innerHTML = `🔄 ${name} bağlanıyor...`;
            let newConn = peer.connect(phone);
            if(!newConn) { updateContactStatus(contactId, 'offline'); dom.statusBar.innerHTML = `❌ ${name} bağlanılamadı`; return; }
            currentConnection = newConn;
            setupConnection(currentConnection, contactId, name);
            setTimeout(() => {
                if(currentConnection === newConn && !isConnected) {
                    updateContactStatus(contactId, 'offline');
                    addSystemMessage(`${name} bağlantı zaman aşımı`);
                    setConnectedState(false);
                    currentConnection=null;
                    dom.statusBar.innerHTML = `⏰ ${name} bağlantı zaman aşımı`;
                }
            }, 10000);
        }
        
        function disconnectCurrent() {
            if(currentConnection) {
                let contact = contacts.find(c=>c.id===activeContactId);
                if(contact) {
                    updateContactStatus(activeContactId,'offline');
                    addSystemMessage(`${contact.name} ile bağlantı kesildi.`);
                }
                currentConnection.close();
                currentConnection=null; isConnected=false;
                setConnectedState(false);
                dom.statusBar.innerHTML = `❌ Bağlantı kesildi`;
            }
        }
        
        function setConnectedState(connected) {
            isConnected=connected;
            dom.messageInput.disabled=!connected;
            dom.sendButton.disabled=!connected;
            if(!connected && activeContactId) dom.messageInput.placeholder="Mesaj yazın (bağlantı yok)";
            else if(connected) dom.messageInput.placeholder="Mesaj yazın...";
        }
        
        function sendText() {
            if(!activeContactId) { addSystemMessage('Önce bir kişi seçin.'); return; }
            let text=dom.messageInput.value.trim();
            if(!text) return;
            sendMessageWithQueue(activeContactId,'text',text);
            dom.messageInput.value='';
        }
        
        function renderMessages() {
            if(!dom.messagesArea) return;
            dom.messagesArea.innerHTML = '';
            if(!activeContactId) {
                dom.messagesArea.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">👈 Ayarlardan kişi ekleyip sohbet başlatın</div>';
                return;
            }
            let history = messagesHistory[activeContactId] || [];
            history.forEach(msg => {
                let div = document.createElement('div'); div.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                let timeStr = new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                let contentHtml = '';
                if(msg.msgType === 'text') contentHtml = `<div class="message-content">${!msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''}${escapeHtml(msg.content)}</div>`;
                else if(msg.msgType === 'image') contentHtml = `<div class="message-content"><img src="${msg.fileData}" class="message-image" onclick="window.open('${msg.fileData}','_blank')"></div>`;
                else if(msg.msgType === 'file') contentHtml = `<div class="message-content file-message" onclick="downloadFile('${msg.fileData}', '${msg.content}')">📎 ${escapeHtml(msg.content)}</div>`;
                let readHtml = msg.isSent ? `<div class="read-status ${msg.read ? 'read' : ''}">${msg.read ? '✓✓ Okundu' : '✓ Gönderildi'}</div>` : '';
                div.innerHTML = contentHtml + `<div style="font-size:0.55rem; color:#94a3b8;">${timeStr}</div>` + readHtml;
                dom.messagesArea.appendChild(div);
            });
            dom.messagesArea.scrollTop = dom.messagesArea.scrollHeight;
            if(unreadCounts[activeContactId]) delete unreadCounts[activeContactId];
        }
        
        function addSystemMessage(text) {
            if(!activeContactId) return;
            let div=document.createElement('div'); div.className='message received'; div.style.alignSelf='center';
            div.innerHTML=`<div class="message-content system-msg">📡 ${escapeHtml(text)}</div>`;
            dom.messagesArea.appendChild(div);
            dom.messagesArea.scrollTop=dom.messagesArea.scrollHeight;
        }
        
        function updateActiveDisplay() {
            dom.activeContactNameSpan.innerText = activeContactName || "Seçili kişi yok";
        }
        
        function handleIncoming(incoming) {
            let contact=contacts.find(c=>c.phoneNumber===incoming.peer);
            if(!contact) { incoming.close(); return; }
            if(currentConnection && isConnected) { incoming.close(); return; }
            if(currentConnection) currentConnection.close();
            currentConnection=incoming;
            activeContactId=contact.id; activeContactName=contact.name;
            dom.activeContactNameSpan.innerText=contact.name;
            renderMessages();
            setupConnection(currentConnection, contact.id, contact.name);
            updateContactStatus(contact.id,'connected');
            setConnectedState(true);
            addSystemMessage(`${contact.name} sizinle bağlantı kurdu.`);
            flushPending(contact.id);
            dom.statusBar.innerHTML = `✅ ${contact.name} ile bağlantı aktif`;
        }
        
        function saveContacts() { localStorage.setItem('p2p_contacts_v5', JSON.stringify(contacts)); }
        function saveMessages() { localStorage.setItem('p2p_messages_v5', JSON.stringify(messagesHistory)); }
        function loadContacts() { let stored=localStorage.getItem('p2p_contacts_v5'); contacts=stored?JSON.parse(stored):[]; contacts.forEach(c=>{ if(!contactStatus[c.id]) contactStatus[c.id]='offline'; if(!pendingMessages[c.id]) pendingMessages[c.id]=[]; }); }
        function loadMessages() { let stored=localStorage.getItem('p2p_messages_v5'); messagesHistory=stored?JSON.parse(stored):{}; }
        
        // Açılır kutuda kişileri göster
        function renderContactsInDropdown() {
            if(!dom.contactsListDropdown) return;
            if(contacts.length === 0) {
                dom.contactsListDropdown.innerHTML = '<div class="empty-contacts-small">📭 Henüz kişi eklenmemiş</div>';
                return;
            }
            let html = '';
            contacts.forEach((contact, index) => {
                let status = contactStatus[contact.id] || 'offline';
                let statusClass = status === 'connected' ? 'online' : (status === 'connecting' ? 'connecting' : 'offline');
                let isActive = activeContactId === contact.id;
                let pendingCount = pendingMessages[contact.id]?.length || 0;
                let unreadCount = unreadCounts[contact.id] || 0;
                html += `
                    <div class="contact-dropdown-item ${isActive ? 'active' : ''}" data-id="${contact.id}" data-phone="${contact.phoneNumber}" data-name="${escapeHtml(contact.name)}">
                        <div class="contact-info-flex">
                            <div class="contact-number-circle">${index + 1}</div>
                            <div class="contact-details">
                                <div class="contact-name-small">
                                    ${escapeHtml(contact.name)}
                                    ${status === 'connected' ? '<span class="badge-mini online-badge-mini">🟢 Çevrimiçi</span>' : ''}
                                    ${pendingCount ? `<span class="badge-mini pending-badge-mini">📬 ${pendingCount}</span>` : ''}
                                    ${unreadCount ? `<span class="badge-mini unread-badge-mini">🔔 ${unreadCount}</span>` : ''}
                                </div>
                                <div class="contact-phone-small">📞 ${escapeHtml(contact.phoneNumber)}</div>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div class="status-dot-small ${statusClass}"></div>
                            <button class="delete-contact-icon" data-delete="${contact.id}">🗑</button>
                        </div>
                    </div>
                `;
            });
            dom.contactsListDropdown.innerHTML = html;
            // Tıklama ile seçme
            document.querySelectorAll('#contactsListDropdown .contact-dropdown-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if(e.target.classList.contains('delete-contact-icon')) return;
                    let id = item.dataset.id, phone = item.dataset.phone, name = item.dataset.name;
                    selectAndConnect(id, phone, name);
                    dom.settingsDropdown.style.display = 'none';
                });
            });
            // Silme butonları
            document.querySelectorAll('.delete-contact-icon').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let id = btn.dataset.delete;
                    deleteContactById(id);
                    renderContactsInDropdown();
                });
            });
        }
        
        function deleteContactById(id) {
            if(confirm('Kişiyi silmek mesaj geçmişini siler.')) {
                if(activeContactId===id) {
                    if(currentConnection) currentConnection.close();
                    activeContactId=null; activeContactName="";
                    dom.activeContactNameSpan.innerText="Seçili kişi yok";
                    setConnectedState(false);
                    renderMessages();
                }
                contacts=contacts.filter(c=>c.id!==id);
                delete contactStatus[id]; delete pendingMessages[id]; delete messagesHistory[id]; delete unreadCounts[id];
                saveContacts(); saveMessages();
                renderMessages();
                if(dom.settingsDropdown.style.display === 'flex') renderContactsInDropdown();
            }
        }
        
        function openAddContactModal() {
            dom.newContactName.value = '';
            dom.newContactPhone.value = '';
            dom.addContactModal.style.display = 'flex';
        }
        
        function addNewContact() {
            let name = dom.newContactName.value.trim();
            let phone = dom.newContactPhone.value.trim().replace(/\s/g, '');
            if(!name || !phone) { alert('Lütfen ad ve telefon numarası girin'); return; }
            if(contacts.some(c => c.phoneNumber === phone)) { alert('Bu telefon numarası zaten listede'); return; }
            let newId = Date.now() + '_' + Math.random().toString(36);
            contacts.push({ id: newId, name, phoneNumber: phone });
            contactStatus[newId] = 'offline';
            pendingMessages[newId] = [];
            saveContacts();
            dom.addContactModal.style.display = 'none';
            if(dom.settingsDropdown.style.display === 'flex') renderContactsInDropdown();
        }
        
        window.downloadFile = (url,name)=>{ let a=document.createElement('a'); a.href=url; a.download=name; a.click(); };
        
        function init() {
            let stored=getStoredPhone();
            if(stored) { myPhoneNumber=stored; dom.miniPhoneDisplay.textContent=myPhoneNumber; dom.currentPhoneDisplay.textContent=myPhoneNumber; initPeerWithPhone(myPhoneNumber); }
            else { openSettingsDropdown(); }
            loadContacts(); loadMessages(); renderMessages();
            if(Notification.permission==='default') Notification.requestPermission();
        }
        
        // Event listeners
        dom.sendButton.onclick = sendText;
        dom.messageInput.onkeypress = (e) => { if(e.key==='Enter' && activeContactId) sendText(); };
        dom.copyMiniPhoneBtn.onclick = () => { if(myPhoneNumber){ navigator.clipboard.writeText(myPhoneNumber); dom.copyMiniPhoneBtn.textContent = '✅'; setTimeout(()=>dom.copyMiniPhoneBtn.textContent='📋 Kopyala',1500); } };
        
        dom.settingsIconBtn.onclick = openSettingsDropdown;
        dom.closeSettingsBtn.onclick = () => { dom.settingsDropdown.style.display = 'none'; };
        dom.savePhoneBtn.onclick = () => {
            let newPhone = dom.settingsPhoneInput.value.trim().replace(/\s/g, '');
            if(!newPhone) { alert('Geçerli bir telefon numarası girin'); return; }
            changePhoneNumber(newPhone);
            dom.settingsDropdown.style.display = 'none';
        };
        dom.addContactDropdownBtn.onclick = openAddContactModal;
        
        dom.closeAddModalBtn.onclick = () => { dom.addContactModal.style.display = 'none'; };
        dom.confirmAddBtn.onclick = addNewContact;
        
        // Emoji, dosya, resim
        dom.emojiBtn.onclick = () => {
            if(emojiPicker){ emojiPicker.remove(); emojiPicker=null; return; }
            emojiPicker=document.createElement('div'); emojiPicker.className='emoji-picker';
            let emojis=['😀','😂','🥰','😎','😢','😡','👍','❤️','🔥','🎉','🙏','💯','✨','🍕','☕','🏆','😍','🥺','🤣','💪'];
            emojis.forEach(e=>{ let span=document.createElement('span'); span.textContent=e; span.onclick=()=>{ sendMessageWithQueue(activeContactId,'text',e); emojiPicker.remove(); emojiPicker=null; }; emojiPicker.appendChild(span); });
            document.body.appendChild(emojiPicker);
        };
        dom.fileBtn.onclick = () => {
            let input=document.createElement('input'); input.type='file';
            input.onchange=(e)=>{ if(e.target.files[0]){ let reader=new FileReader(); reader.onload=(ev)=>{ sendMessageWithQueue(activeContactId,'file','',ev.target.result,e.target.files[0].type,e.target.files[0].name); }; reader.readAsDataURL(e.target.files[0]); } }; input.click();
        };
        dom.imageBtn.onclick = () => {
            let input=document.createElement('input'); input.type='file'; input.accept='image/*';
            input.onchange=(e)=>{ if(e.target.files[0]){ let reader=new FileReader(); reader.onload=(ev)=>{ sendMessageWithQueue(activeContactId,'image','',ev.target.result,e.target.files[0].type,e.target.files[0].name); }; reader.readAsDataURL(e.target.files[0]); } }; input.click();
        };
        
        init();
    </script>
</body>
</html>
