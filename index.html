<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - Telefonla P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo-icon { font-size: 1.8rem; }
        .header-text { flex: 1; }
        .app-header h2 { font-size: 1.4rem; font-weight: 700; line-height: 1.2; }
        .sub-title { font-size: 0.7rem; opacity: 0.9; margin-top: 2px; }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 6px 16px;
            text-align: center;
            flex-shrink: 0;
        }
        .connection-status { 
            font-size: 0.65rem; 
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .internet-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 500;
        }
        .internet-badge.online { background: #22c55e; color: white; }
        .internet-badge.offline { background: #ef4444; color: white; }
        .internet-badge.checking { background: #eab308; color: white; }

        .contacts-panel {
            background: #f8f9fc;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .my-info {
            padding: 6px 12px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .my-id-box { flex: 1; min-width: 0; }
        .my-id-label { font-size: 0.55rem; font-weight: 600; color: #64748b; }
        .my-id-value {
            font-family: monospace;
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 4px 6px;
            border-radius: 6px;
            word-break: break-all;
            margin-top: 2px;
            font-weight: 500;
        }
        .edit-phone-btn, .copy-id-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            cursor: pointer;
            font-weight: 500;
        }

        /* Açılır Kişi Listesi (Dropdown) */
        .contacts-dropdown-wrapper {
            position: relative;
            padding: 8px 12px;
            background: white;
            border-bottom: 1px solid #eef2f6;
        }
        .contacts-dropdown-btn {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
            transition: all 0.2s;
        }
        .contacts-dropdown-btn:hover {
            background: #eef2ff;
            border-color: #4a90e2;
        }
        .contacts-dropdown-btn .selected-contact-name {
            color: #4a90e2;
            font-weight: 600;
        }
        .dropdown-arrow {
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .contacts-dropdown-btn.open .dropdown-arrow {
            transform: rotate(180deg);
        }
        .contacts-dropdown-menu {
            position: absolute;
            top: calc(100% - 4px);
            left: 12px;
            right: 12px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.02);
            max-height: 260px;
            overflow-y: auto;
            z-index: 100;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .contacts-dropdown-menu.show {
            display: block;
        }
        .dropdown-contact-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background 0.15s;
        }
        .dropdown-contact-item:hover {
            background: #f8fafc;
        }
        .dropdown-contact-item.active {
            background: #eef2ff;
        }
        .dropdown-contact-info {
            flex: 1;
        }
        .dropdown-contact-name {
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .dropdown-contact-phone {
            font-size: 0.65rem;
            color: #64748b;
            font-family: monospace;
            margin-top: 2px;
        }
        .dropdown-contact-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-dot.online { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
        .status-dot.offline { background: #ef4444; }
        .status-dot.connecting { background: #eab308; animation: pulse 1s infinite; }
        .status-dot.pending { background: #f97316; animation: pulse 1s infinite; }
        .connect-dropdown-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            background: #eef2ff;
            color: #4a90e2;
        }
        .connect-dropdown-btn.connected {
            background: #dcfce7;
            color: #166534;
        }
        .add-contact-quick {
            padding: 12px 16px;
            border-top: 1px solid #eef2f6;
            background: #fafcff;
            color: #4a90e2;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .add-contact-quick:hover {
            background: #eff6ff;
        }

        .action-buttons-row-header {
            display: flex;
            gap: 10px;
            padding: 6px 12px;
            background: white;
            border-bottom: 1px solid #eef2f6;
        }
        .action-header-btn {
            background: #f1f5f9;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 500;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 24px;
            padding: 18px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px 12px;
            margin: 6px 0;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 14px; }
        .modal-save { background: #4a90e2; color: white; flex: 1; padding: 8px; border-radius: 25px; border: none; font-weight: 600; }
        .modal-cancel { background: #e2e8f0; color: #334155; flex: 1; border: none; border-radius: 25px; font-weight: 600; }

        .emoji-picker {
            position: fixed;
            bottom: 95px;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 20px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 1000;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        .emoji-picker span { font-size: 1.6rem; cursor: pointer; text-align: center; padding: 5px; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; align-items: flex-start; }

        .message-content {
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .sent .message-content { background: #4a90e2; color: white; border-bottom-right-radius: 4px; }
        .received .message-content { background: white; color: #1e293b; border: 0.5px solid #e2e8f0; border-bottom-left-radius: 4px; }

        .read-status {
            font-size: 0.55rem;
            margin-top: 2px;
            margin-right: 4px;
            color: #64748b;
        }
        .sent .read-status { color: #cbd5e1; }
        .read-status.read { color: #22c55e; }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-bar {
            height: 100%;
            background: #4a90e2;
            width: 0%;
            transition: width 0.3s;
        }

        .typing-indicator {
            font-size: 0.65rem;
            color: #64748b;
            padding: 4px 12px;
            font-style: italic;
        }

        .current-chat-info {
            padding: 5px 12px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .current-chat-name { color: #4a90e2; font-weight: 600; }

        .input-container {
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #edf2f7;
            padding: 8px 12px;
        }
        .message-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            outline: none;
            font-size: 0.9rem;
        }
        #sendButton {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 600;
            cursor: pointer;
        }
        .action-buttons-row { display: flex; gap: 12px; padding: 4px 4px 0 4px; }
        .action-icon-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        @media (max-width: 480px) {
            .emoji-picker { grid-template-columns: repeat(7, 1fr); bottom: 105px; }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <div class="app-header">
            <div class="logo-icon">📞</div>
            <div class="header-text">
                <h2>SEYFİÇET</h2>
                <div class="sub-title">🔐 Telefon Numarası ile P2P</div>
            </div>
        </div>
        <div class="chat-header">
            <div class="connection-status" id="status">
                <span>Bağlantı bekleniyor...</span>
                <span id="internetStatusBadge" class="internet-badge checking">🌐 Kontrol ediliyor...</span>
            </div>
        </div>
        <div class="contacts-panel">
            <div class="my-info">
                <div class="my-id-box">
                    <div class="my-id-label">📱 BENİM TELEFON NUMARAM</div>
                    <div class="my-id-value" id="myPeerId">Ayarlanıyor...</div>
                </div>
                <button class="edit-phone-btn" id="editPhoneBtn">✏️ Düzenle</button>
                <button class="copy-id-btn" id="copyIdBtn">📋 Kopyala</button>
            </div>
            
            <!-- Açılır Kişi Listesi (Dropdown) -->
            <div class="contacts-dropdown-wrapper">
                <div class="contacts-dropdown-btn" id="contactsDropdownBtn">
                    <span>📒 <span id="selectedContactDisplay">Kişi Seçin</span></span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="contacts-dropdown-menu" id="contactsDropdownMenu"></div>
            </div>
            
            <div class="action-buttons-row-header">
                <button class="action-header-btn" id="clearMessagesBtnHeader">🗑 Mesajları Sil</button>
                <button class="action-header-btn" id="addContactBtnHeader">➕ Yeni Kişi</button>
            </div>
        </div>
        
        <div class="current-chat-info">
            💬 Sohbet: <span id="activeContactName" class="current-chat-name">Seçili kişi yok</span>
            <span id="typingIndicator" style="display:none;" class="typing-badge">✍️ Yazıyor...</span>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-container">
            <div class="message-input-row">
                <input type="text" id="messageInput" placeholder="Mesaj yazın veya dosya sürükleyin..." disabled>
                <button id="sendButton" disabled>Gönder</button>
            </div>
            <div class="action-buttons-row">
                <button class="action-icon-btn" id="emojiBtn">😊 Emoji</button>
                <button class="action-icon-btn" id="fileBtn">📎 Dosya</button>
                <button class="action-icon-btn" id="imageBtn">🖼️ Resim</button>
            </div>
        </div>
    </div>

    <div id="phoneModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>📱 Telefon Numaranız</h3>
            <p style="font-size: 0.75rem; color:#475569;">Bu numara sizin benzersiz kimliğiniz olacak.</p>
            <input type="tel" id="phoneNumberInput" placeholder="Örn: 905551234567" value="">
            <div class="modal-buttons">
                <button class="modal-cancel" id="phoneModalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="phoneModalSaveBtn">Kaydet ve Yeniden Başlat</button>
            </div>
        </div>
    </div>

    <div id="contactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="contactNameInput" placeholder="Kişi adı (Örn: Ahmet)">
            <input type="tel" id="contactPhoneInput" placeholder="Telefon Numarası (Örn: 905551234567)">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="modalSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ---------- İNTERNET BAĞLANTI KONTROLÜ ----------
        let isInternetOnline = true;
        let internetCheckInterval = null;
        
        async function checkInternetConnection() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const response = await fetch('https://www.google.com/favicon.ico', { 
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                isInternetOnline = true;
                updateInternetBadge(true);
            } catch (err) {
                isInternetOnline = false;
                updateInternetBadge(false);
            }
            updateGlobalConnectionHint();
        }
        
        function updateInternetBadge(online) {
            const badge = document.getElementById('internetStatusBadge');
            if (!badge) return;
            if (online) {
                badge.innerHTML = '🌐 İnternet Bağlı';
                badge.className = 'internet-badge online';
            } else {
                badge.innerHTML = '⚠️ İnternet Yok';
                badge.className = 'internet-badge offline';
            }
        }
        
        function updateGlobalConnectionHint() {
            const statusDiv = document.getElementById('status');
            if (!statusDiv) return;
            let internetText = isInternetOnline ? '✅ İnternet aktif' : '❌ İnternet yok';
            if (!isInternetOnline && statusDiv) {
                statusDiv.innerHTML = `<span>⚠️ ${internetText} - P2P bağlantısı kesilebilir</span><span id="internetStatusBadge" class="internet-badge offline">⚠️ İnternet Yok</span>`;
            } else {
                // mevcut status'u koru ama badge'i güncelle
                const existingBadge = document.getElementById('internetStatusBadge');
                if (existingBadge) return;
            }
            const badgeSpan = document.getElementById('internetStatusBadge');
            if (badgeSpan && statusDiv) {
                const mainText = statusDiv.querySelector('span:first-child');
                if (mainText) mainText.innerHTML = isInternetOnline ? '✅ İnternet bağlantısı mevcut' : '⚠️ İnternet bağlantısı yok - P2P çalışmayabilir';
            }
        }
        
        // Düzenli kontrol
        setInterval(checkInternetConnection, 15000);
        checkInternetConnection();
        
        // ---------- MEVCUT UYGULAMA KODU (Dropdown ile genişletilmiş) ----------
        let myPhoneNumber = null;
        let peer, currentConnection, isConnected = false;
        let activeContactId = null, activeContactName = "";
        let contacts = [], messagesHistory = {}, pendingMessages = {}, contactStatus = {};
        let unreadCounts = {}, typingTimeouts = {};
        let emojiPicker = null;
        
        const elements = {
            myPeerIdDiv: document.getElementById('myPeerId'), copyIdBtn: document.getElementById('copyIdBtn'),
            editPhoneBtn: document.getElementById('editPhoneBtn'), phoneModal: document.getElementById('phoneModal'),
            phoneNumberInput: document.getElementById('phoneNumberInput'), phoneModalCancelBtn: document.getElementById('phoneModalCancelBtn'),
            phoneModalSaveBtn: document.getElementById('phoneModalSaveBtn'),
            clearMessagesBtn: document.getElementById('clearMessagesBtnHeader'),
            addContactBtn: document.getElementById('addContactBtnHeader'),
            modal: document.getElementById('contactModal'),
            contactNameInput: document.getElementById('contactNameInput'), contactPhoneInput: document.getElementById('contactPhoneInput'),
            modalCancelBtn: document.getElementById('modalCancelBtn'), modalSaveBtn: document.getElementById('modalSaveBtn'),
            messagesArea: document.getElementById('messagesArea'), messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton'), statusDiv: document.getElementById('status'),
            activeContactNameSpan: document.getElementById('activeContactName'), typingIndicator: document.getElementById('typingIndicator'),
            emojiBtn: document.getElementById('emojiBtn'), fileBtn: document.getElementById('fileBtn'), imageBtn: document.getElementById('imageBtn'),
            chatContainer: document.getElementById('chatContainer'),
            contactsDropdownBtn: document.getElementById('contactsDropdownBtn'),
            contactsDropdownMenu: document.getElementById('contactsDropdownMenu'),
            selectedContactDisplay: document.getElementById('selectedContactDisplay')
        };
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }
        function showNotification(title, body) { if (Notification.permission === 'granted') new Notification(title, { body }); else if (Notification.permission !== 'denied') Notification.requestPermission(); }
        
        function savePhoneNumber(phone) { let cleaned = phone.replace(/\s/g, ''); if (!cleaned) return false; localStorage.setItem('p2p_my_phone', cleaned); myPhoneNumber = cleaned; elements.myPeerIdDiv.textContent = myPhoneNumber; return true; }
        function getStoredPhone() { return localStorage.getItem('p2p_my_phone'); }
        
        function initPeerWithPhone(phoneNumber) {
            if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e) {} }
            peer = new Peer(phoneNumber, { debug: 0, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
            peer.on('open', () => { elements.statusDiv.innerHTML = `✅ ${myPhoneNumber} numarası aktif! <span id="internetStatusBadge" class="internet-badge checking"></span>`; updateInternetBadge(isInternetOnline); });
            peer.on('error', (err) => { if (err.type === 'unavailable-id') showPhoneEditModal(); else elements.statusDiv.innerHTML = `⚠️ Hata: ${err.type}`; });
            peer.on('connection', handleIncoming);
        }
        
        function showPhoneEditModal() { elements.phoneNumberInput.value = myPhoneNumber || ''; elements.phoneModal.style.display = 'flex'; }
        function changePhoneNumber(newPhone) {
            if (!newPhone || newPhone === myPhoneNumber) return false;
            if (currentConnection) { try { currentConnection.close(); } catch(e) {} }
            currentConnection = null; isConnected = false; activeContactId = null; activeContactName = "";
            setConnectedState(false);
            if (peer && !peer.destroyed) peer.destroy();
            savePhoneNumber(newPhone);
            contacts = []; messagesHistory = {}; pendingMessages = {}; contactStatus = {}; unreadCounts = {};
            saveContacts(); saveMessagesHistory();
            renderDropdownContacts();
            renderMessagesForActiveContact();
            initPeerWithPhone(myPhoneNumber);
            return true;
        }
        
        function sendWithProgress(file, type, callback) { const reader = new FileReader(); reader.onprogress = (e) => { if (e.lengthComputable) callback(e.loaded / e.total * 100); }; reader.onload = (e) => { callback(100); sendMessageWithQueue(activeContactId, type, '', e.target.result, file.type, file.name); }; reader.readAsDataURL(file); }
        function sendMessageWithQueue(contactId, type, content, fileData = null, mime = '', fileName = '') { if (!contactId) return false; const isConnectedNow = (activeContactId === contactId && isConnected && currentConnection); if (isConnectedNow) { try { let msg = { type }; if (type === 'text') msg.text = content; else { msg.name = fileName; msg.data = fileData; msg.mime = mime; } currentConnection.send(msg); addMessageToHistory(contactId, content || fileName, 'Ben', true, type, fileData, mime); return true; } catch(err) { queueMessage(contactId, { type, content, fileData, mime, name: fileName }); return false; } } else { queueMessage(contactId, { type, content, fileData, mime, name: fileName }); return false; } }
        function queueMessage(contactId, msg) { if (!pendingMessages[contactId]) pendingMessages[contactId] = []; pendingMessages[contactId].push(msg); if (contactStatus[contactId] !== 'connected') updateContactStatus(contactId, 'pending'); addMessageToHistory(contactId, `⏳ ${msg.content || msg.name} (beklemede)`, 'Ben', true, msg.type, msg.fileData, msg.mime, true); }
        function flushPendingMessages(contactId) { if (!pendingMessages[contactId]?.length || !currentConnection || !isConnected || activeContactId !== contactId) return; let pending = [...pendingMessages[contactId]]; pendingMessages[contactId] = []; for (let msg of pending) { try { let payload = { type: msg.type }; if (msg.type === 'text') payload.text = msg.content; else { payload.name = msg.name; payload.data = msg.fileData; payload.mime = msg.mime; } currentConnection.send(payload); addMessageToHistory(contactId, msg.content || msg.name, 'Ben', true, msg.type, msg.fileData, msg.mime); } catch(err) { if (!pendingMessages[contactId]) pendingMessages[contactId] = []; pendingMessages[contactId].unshift(msg); } } if (pending.length) addSystemMessage(`${pending.length} bekleyen mesaj gönderildi.`); updateContactStatus(contactId, 'connected'); }
        function addMessageToHistory(contactId, content, sender, isSent, msgType, fileData = null, mime = '', isPending = false) { if (!messagesHistory[contactId]) messagesHistory[contactId] = []; let msg = { content, sender, isSent, msgType, fileData, mime, isPending, read: isSent, timestamp: Date.now() }; messagesHistory[contactId].push(msg); saveMessagesHistory(); if (activeContactId === contactId) renderMessagesForActiveContact(); if (!isSent && activeContactId !== contactId) { unreadCounts[contactId] = (unreadCounts[contactId] || 0) + 1; renderDropdownContacts(); showNotification(sender, content.length > 30 ? content.substring(0,30)+'...' : content); } }
        function updateContactStatus(id, status) { contactStatus[id] = status; renderDropdownContacts(); }
        
        function setupConnectionEvents(connection, contactId, contactName) {
            connection.on('open', () => { if (activeContactId === contactId) { isConnected = true; setConnectedState(true); updateContactStatus(contactId, 'connected'); addSystemMessage(`${contactName} ile görüşmeye hazırsınız.`); flushPendingMessages(contactId); } });
            let typingTimeout = null;
            connection.on('data', (data) => { if (activeContactId === contactId && currentConnection === connection) { if (data.type === 'text') { addMessageToHistory(contactId, data.text, contactName, false, 'text'); } else if (data.type === 'file' || data.type === 'image') { addMessageToHistory(contactId, data.name, contactName, false, data.type, data.data, data.mime); } else if (data.type === 'typing') { elements.typingIndicator.style.display = 'inline-block'; if (typingTimeout) clearTimeout(typingTimeout); typingTimeout = setTimeout(() => elements.typingIndicator.style.display = 'none', 2000); } } });
            connection.on('close', () => { if (activeContactId === contactId && currentConnection === connection) { addSystemMessage(`${contactName} bağlantıyı kapattı.`); updateContactStatus(contactId, 'offline'); setConnectedState(false); currentConnection = null; isConnected = false; } });
        }
        
        function sendTyping() { if (currentConnection && isConnected) currentConnection.send({ type: 'typing' }); }
        let typingTimer;
        if(elements.messageInput) elements.messageInput.addEventListener('input', () => { if (isConnected && activeContactId) { sendTyping(); clearTimeout(typingTimer); typingTimer = setTimeout(() => {}, 1000); } });
        
        function connectToContact(id, phoneNumber, name) {
            if (activeContactId === id && isConnected) { disconnectCurrent(); return; }
            if (currentConnection) disconnectCurrent();
            activeContactId = id; activeContactName = name;
            elements.activeContactNameSpan.innerText = name;
            elements.selectedContactDisplay.innerText = name;
            renderMessagesForActiveContact();
            updateContactStatus(id, 'connecting');
            let newConn = peer.connect(phoneNumber);
            if (!newConn) { updateContactStatus(id, 'offline'); return; }
            currentConnection = newConn;
            setupConnectionEvents(currentConnection, id, name);
            setTimeout(() => { if (currentConnection === newConn && !isConnected) { updateContactStatus(id, 'offline'); addSystemMessage(`${name} bağlantı zaman aşımı`); setConnectedState(false); currentConnection = null; } }, 10000);
        }
        
        function disconnectCurrent() { if (currentConnection) { let contact = contacts.find(c => c.id === activeContactId); if (contact) { updateContactStatus(activeContactId, 'offline'); addSystemMessage(`${contact.name} ile bağlantı kesildi.`); } currentConnection.close(); currentConnection = null; isConnected = false; setConnectedState(false); } }
        function setConnectedState(connected) { isConnected = connected; elements.messageInput.disabled = !connected; elements.sendButton.disabled = !connected; if (!connected && activeContactId) elements.messageInput.placeholder = "Mesaj yazın (bağlantı yok, bekleme kuyruğuna alınacak)..."; else if (connected) elements.messageInput.placeholder = "Mesaj yazın..."; }
        function sendTextMessage() { if (!activeContactId) { addSystemMessage('Önce bir kişi seçin.'); return; } let text = elements.messageInput.value.trim(); if (!text) return; sendMessageWithQueue(activeContactId, 'text', text); elements.messageInput.value = ''; }
        
        function renderMessagesForActiveContact() {
            if (!elements.messagesArea) return; elements.messagesArea.innerHTML = '';
            if (!activeContactId) { elements.messagesArea.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">👈 Kişi seçip bağlanın</div>'; return; }
            let history = messagesHistory[activeContactId] || [];
            history.forEach((msg) => {
                let div = document.createElement('div'); div.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                let timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                let contentHtml = '';
                if (msg.msgType === 'text') contentHtml = `<div class="message-content">${!msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''}${escapeHtml(msg.content)}</div>`;
                else if (msg.msgType === 'image') contentHtml = `<div class="message-content"><img src="${msg.fileData}" style="max-width:100%; border-radius:12px; cursor:pointer;" onclick="window.open('${msg.fileData}','_blank')"></div>`;
                else if (msg.msgType === 'file') contentHtml = `<div class="message-content" onclick="downloadFile('${msg.fileData}', '${msg.content}')">📎 ${escapeHtml(msg.content)}</div>`;
                let readHtml = msg.isSent ? `<div class="read-status ${msg.read ? 'read' : ''}">${msg.read ? '✓✓ Okundu' : '✓ Gönderildi'}</div>` : '';
                div.innerHTML = contentHtml + `<div style="font-size:0.6rem; color:#94a3b8;">${timeStr}</div>` + readHtml;
                elements.messagesArea.appendChild(div);
            });
            elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight;
            if (unreadCounts[activeContactId]) { delete unreadCounts[activeContactId]; renderDropdownContacts(); }
        }
        
        function renderDropdownContacts() {
            if (!elements.contactsDropdownMenu) return;
            elements.contactsDropdownMenu.innerHTML = '';
            if (contacts.length === 0) {
                elements.contactsDropdownMenu.innerHTML = '<div style="padding: 20px; text-align:center; color:#94a3b8;">📭 Henüz kişi yok<br><span style="font-size:0.7rem;">➕ Yeni Kişi ile ekleyin</span></div>';
            } else {
                contacts.forEach(contact => {
                    let status = contactStatus[contact.id] || 'offline';
                    let statusClass = status === 'connected' ? 'online' : (status === 'connecting' ? 'connecting' : (status === 'pending' ? 'pending' : 'offline'));
                    let isActive = activeContactId === contact.id;
                    let btnText = status === 'connected' ? 'Bağlı' : (status === 'connecting' ? 'Bağlanıyor' : 'Bağlan');
                    let pendingCount = pendingMessages[contact.id]?.length || 0;
                    let unreadCount = unreadCounts[contact.id] || 0;
                    let itemDiv = document.createElement('div');
                    itemDiv.className = `dropdown-contact-item ${isActive ? 'active' : ''}`;
                    itemDiv.innerHTML = `
                        <div class="dropdown-contact-info">
                            <div class="dropdown-contact-name">
                                ${escapeHtml(contact.name)}
                                ${status === 'connected' ? '<span style="font-size:0.6rem; background:#22c55e20; padding:2px 6px; border-radius:12px;">🟢 Çevrimiçi</span>' : ''}
                                ${pendingCount ? `<span class="pending-badge" style="background:#f97316; padding:2px 6px;">📬 ${pendingCount}</span>` : ''}
                                ${unreadCount ? `<span class="unread-badge" style="background:#ef4444; padding:2px 6px;">🔔 ${unreadCount}</span>` : ''}
                            </div>
                            <div class="dropdown-contact-phone">📞 ${escapeHtml(contact.phoneNumber)}</div>
                        </div>
                        <div class="dropdown-contact-status">
                            <div class="status-dot ${statusClass}"></div>
                            <button class="connect-dropdown-btn ${status === 'connected' ? 'connected' : ''}" data-id="${contact.id}" data-phone="${contact.phoneNumber}" data-name="${escapeHtml(contact.name)}">${btnText}</button>
                            <button class="connect-dropdown-btn" style="background:#fee2e2; color:#dc2626;" data-delete="${contact.id}">🗑</button>
                        </div>
                    `;
                    elements.contactsDropdownMenu.appendChild(itemDiv);
                });
            }
            let addQuick = document.createElement('div'); addQuick.className = 'add-contact-quick'; addQuick.innerHTML = '➕ Yeni Kişi Ekle'; addQuick.onclick = () => elements.modal.style.display = 'flex';
            elements.contactsDropdownMenu.appendChild(addQuick);
            
            document.querySelectorAll('.connect-dropdown-btn[data-id]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); let id = btn.dataset.id, phone = btn.dataset.phone, name = btn.dataset.name; if (contactStatus[id] === 'connected') { disconnectCurrent(); updateContactStatus(id, 'offline'); } else connectToContact(id, phone, name); };
            });
            document.querySelectorAll('.connect-dropdown-btn[data-delete]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); deleteContactById(btn.dataset.delete); };
            });
            document.querySelectorAll('.dropdown-contact-item').forEach(item => {
                let connectBtn = item.querySelector('.connect-dropdown-btn[data-id]');
                if (connectBtn) item.style.cursor = 'pointer';
            });
        }
        
        function deleteContactById(id) { if (confirm('Kişiyi silmek mesaj geçmişini ve bekleyen mesajları siler.')) { if (activeContactId === id) { if (currentConnection) currentConnection.close(); activeContactId = null; activeContactName = ""; elements.activeContactNameSpan.innerText = "Seçili kişi yok"; elements.selectedContactDisplay.innerText = "Kişi Seçin"; setConnectedState(false); renderMessagesForActiveContact(); } contacts = contacts.filter(c => c.id !== id); delete contactStatus[id]; delete pendingMessages[id]; delete messagesHistory[id]; delete unreadCounts[id]; saveContacts(); saveMessagesHistory(); renderDropdownContacts(); } }
        function clearMessagesOnly() { if (!activeContactId) { alert('Önce bir kişi seçin.'); return; } if (confirm('Mesaj geçmişi silinecek.')) { messagesHistory[activeContactId] = []; pendingMessages[activeContactId] = []; saveMessagesHistory(); renderMessagesForActiveContact(); addSystemMessage('Mesaj geçmişi temizlendi.'); } }
        function addSystemMessage(text) { if (!activeContactId) return; let div = document.createElement('div'); div.className = 'message received'; div.style.alignSelf = 'center'; div.innerHTML = `<div class="message-content" style="background:#eef2ff; font-size:0.7rem;">📡 ${escapeHtml(text)}</div>`; elements.messagesArea.appendChild(div); elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight; }
        function handleIncoming(incoming) { let contact = contacts.find(c => c.phoneNumber === incoming.peer); if (!contact) { incoming.close(); return; } if (currentConnection && isConnected) { incoming.close(); return; } if (currentConnection) currentConnection.close(); currentConnection = incoming; activeContactId = contact.id; activeContactName = contact.name; elements.activeContactNameSpan.innerText = contact.name; elements.selectedContactDisplay.innerText = contact.name; renderMessagesForActiveContact(); setupConnectionEvents(currentConnection, contact.id, contact.name); updateContactStatus(contact.id, 'connected'); setConnectedState(true); addSystemMessage(`${contact.name} sizinle bağlantı kurdu.`); flushPendingMessages(contact.id); renderDropdownContacts(); }
        function saveContacts() { localStorage.setItem('p2p_contacts_phone_v2', JSON.stringify(contacts)); renderDropdownContacts(); }
        function saveMessagesHistory() { localStorage.setItem('p2p_messages_history_phone_v2', JSON.stringify(messagesHistory)); }
        function loadContacts() { let stored = localStorage.getItem('p2p_contacts_phone_v2'); contacts = stored ? JSON.parse(stored) : []; contacts.forEach(c => { if (!contactStatus[c.id]) contactStatus[c.id] = 'offline'; if (!pendingMessages[c.id]) pendingMessages[c.id] = []; }); renderDropdownContacts(); }
        function loadMessagesHistory() { let stored = localStorage.getItem('p2p_messages_history_phone_v2'); messagesHistory = stored ? JSON.parse(stored) : {}; }
        window.downloadFile = (url, name) => { let a = document.createElement('a'); a.href = url; a.download = name; a.click(); };
        
        function initializeApp() {
            let storedPhone = getStoredPhone();
            if (storedPhone) { myPhoneNumber = storedPhone; elements.myPeerIdDiv.textContent = myPhoneNumber; initPeerWithPhone(myPhoneNumber); }
            else showPhoneEditModal();
            loadContacts(); loadMessagesHistory(); renderMessagesForActiveContact();
            if (Notification.permission === 'default') Notification.requestPermission();
        }
        
        elements.addContactBtn.onclick = () => elements.modal.style.display = 'flex';
        elements.clearMessagesBtn.onclick = clearMessagesOnly;
        elements.modalCancelBtn.onclick = () => elements.modal.style.display = 'none';
        elements.modalSaveBtn.onclick = () => { let name = elements.contactNameInput.value.trim(), phone = elements.contactPhoneInput.value.trim().replace(/\s/g, ''); if (!name || !phone) { alert('Lütfen ad ve telefon numarası girin'); return; } if (contacts.some(c => c.phoneNumber === phone)) { alert('Bu telefon numarası zaten mevcut'); return; } let newId = Date.now() + '_' + Math.random().toString(36); contacts.push({ id: newId, name, phoneNumber: phone }); contactStatus[newId] = 'offline'; pendingMessages[newId] = []; saveContacts(); elements.modal.style.display = 'none'; };
        elements.sendButton.onclick = sendTextMessage;
        elements.copyIdBtn.onclick = () => { if(myPhoneNumber) { navigator.clipboard.writeText(myPhoneNumber); elements.copyIdBtn.textContent = '✅'; setTimeout(() => elements.copyIdBtn.textContent = '📋 Kopyala', 1500); } };
        elements.messageInput.onkeypress = (e) => { if (e.key === 'Enter' && activeContactId) sendTextMessage(); };
        elements.editPhoneBtn.onclick = showPhoneEditModal;
        elements.phoneModalCancelBtn.onclick = () => { elements.phoneModal.style.display = 'none'; if(!myPhoneNumber) initializeApp(); };
        elements.phoneModalSaveBtn.onclick = () => { let newPhone = elements.phoneNumberInput.value.trim().replace(/\s/g, ''); if (!newPhone) { alert('Geçerli telefon numarası girin'); return; } changePhoneNumber(newPhone); elements.phoneModal.style.display = 'none'; };
        
        elements.contactsDropdownBtn.onclick = (e) => { e.stopPropagation(); elements.contactsDropdownMenu.classList.toggle('show'); elements.contactsDropdownBtn.classList.toggle('open'); };
        document.addEventListener('click', (e) => { if (!elements.contactsDropdownBtn.contains(e.target) && !elements.contactsDropdownMenu.contains(e.target)) { elements.contactsDropdownMenu.classList.remove('show'); elements.contactsDropdownBtn.classList.remove('open'); } });
        
        let emojiOpen = false;
        elements.emojiBtn.onclick = () => { if (emojiPicker) { emojiPicker.remove(); emojiPicker = null; return; } emojiPicker = document.createElement('div'); emojiPicker.className = 'emoji-picker'; let emojis = ['😀','😂','🥰','😎','😢','😡','👍','❤️','🔥','🎉','🙏','💯','✨','🍕','☕','🏆','😍','🥺','🤣','💪']; emojis.forEach(e => { let span = document.createElement('span'); span.textContent = e; span.onclick = () => { sendMessageWithQueue(activeContactId, 'text', e); emojiPicker.remove(); emojiPicker = null; }; emojiPicker.appendChild(span); }); document.body.appendChild(emojiPicker); };
        elements.fileBtn.onclick = () => { let input = document.createElement('input'); input.type = 'file'; input.onchange = (e) => { if (e.target.files[0]) sendWithProgress(e.target.files[0], 'file', (p) => {}); }; input.click(); };
        elements.imageBtn.onclick = () => { let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { if (e.target.files[0]) sendWithProgress(e.target.files[0], 'image', (p) => {}); }; input.click(); };
        elements.chatContainer.addEventListener('dragover', (e) => { e.preventDefault(); });
        elements.chatContainer.addEventListener('drop', (e) => { e.preventDefault(); let files = e.dataTransfer.files; if (files.length) sendWithProgress(files[0], files[0].type.startsWith('image/') ? 'image' : 'file', (p) => {}); });
        
        initializeApp();
    </script>
</body>
</html>
