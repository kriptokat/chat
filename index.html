<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .header-text {
            flex: 1;
        }

        .app-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .sub-title {
            font-size: 0.7rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 6px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .connection-status {
            font-size: 0.65rem;
            margin-top: 2px;
            color: #f0f0f0;
        }

        .contacts-panel {
            background: #f8f9fc;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .my-info {
            padding: 6px 12px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .my-id-box {
            flex: 1;
            min-width: 0;
        }

        .my-id-label {
            font-size: 0.55rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
        }

        .my-id-value {
            font-family: monospace;
            font-size: 0.6rem;
            background: #f1f5f9;
            padding: 4px 6px;
            border-radius: 6px;
            word-break: break-all;
            margin-top: 2px;
            color: #1e293b;
        }

        .copy-id-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            white-space: nowrap;
        }

        .copy-id-btn:active {
            background: #cbd5e1;
            transform: scale(0.96);
        }

        .contacts-header {
            padding: 8px 12px 4px 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .contacts-title {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.75rem;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .add-contact-btn, .clear-messages-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 0.6rem;
            font-weight: 500;
            cursor: pointer;
        }

        .clear-messages-btn {
            background: #f59e0b;
        }

        .clear-messages-btn:active, .add-contact-btn:active {
            transform: scale(0.96);
        }

        .contacts-list {
            max-height: 115px;
            overflow-y: auto;
            padding: 0 10px 6px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .contact-item {
            background: white;
            border-radius: 10px;
            padding: 5px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .contact-item.active-contact {
            background: #e3f2fd;
            border-color: #4a90e2;
            box-shadow: 0 0 0 1px #4a90e2;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: #0f172a;
        }

        .contact-peerid {
            font-family: monospace;
            font-size: 0.55rem;
            color: #64748b;
            margin-top: 1px;
        }

        .contact-actions {
            display: flex;
            gap: 5px;
            margin-left: 6px;
        }

        .contact-actions button {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 14px;
        }

        .connect-contact-btn {
            background: #e6f7e6;
            color: #2e7d32;
            font-size: 0.6rem;
            padding: 3px 8px;
        }

        .delete-contact-btn {
            color: #ef4444;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 85%;
            max-width: 300px;
            border-radius: 24px;
            padding: 18px;
        }

        .modal-content h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px 12px;
            margin: 6px 0;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 8px;
            border-radius: 25px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-save {
            background: #4a90e2;
            color: white;
        }

        .modal-cancel {
            background: #e2e8f0;
            color: #334155;
        }

        .emoji-picker {
            position: fixed;
            bottom: 95px;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 1000;
            max-width: 95%;
            margin: 0 auto;
            border: 1px solid #e2e8f0;
        }
        .emoji-picker span {
            font-size: 1.6rem;
            cursor: pointer;
            text-align: center;
            padding: 5px;
            border-radius: 12px;
        }
        .emoji-picker span:active {
            background: #e2e8f0;
            transform: scale(0.95);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-content {
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .sent .message-content {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .message-content {
            background: white;
            color: #1e293b;
            border: 0.5px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message-content.file-message {
            background: #eef2ff;
            cursor: pointer;
        }
        .sent .message-content.file-message {
            background: #3b82f6;
        }
        .message-image {
            max-width: 180px;
            max-height: 180px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-time {
            font-size: 0.55rem;
            color: #64748b;
            margin-top: 2px;
            margin-left: 6px;
            margin-right: 6px;
        }

        .current-chat-info {
            padding: 5px 12px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.7rem;
            font-weight: 500;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .current-chat-name {
            color: #4a90e2;
            font-weight: 600;
        }

        .input-container {
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #edf2f7;
            padding: 8px 12px;
        }

        .message-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            outline: none;
            font-size: 0.9rem;
            background: #ffffff;
        }

        #sendButton {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            min-width: 70px;
        }

        #sendButton:active {
            transform: scale(0.96);
        }

        #sendButton:disabled {
            background: #b9c8f0;
            cursor: not-allowed;
        }

        .action-buttons-row {
            display: flex;
            gap: 12px;
            justify-content: flex-start;
            padding: 4px 4px 0 4px;
        }

        .action-icon-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.1s;
        }

        .action-icon-btn:active {
            transform: scale(0.96);
            background: #e2e8f0;
        }

        .retry-badge {
            font-size: 0.55rem;
            margin-left: 5px;
            background: #ff9800;
            padding: 2px 5px;
            border-radius: 14px;
            color: white;
        }

        .suspended-badge {
            font-size: 0.55rem;
            margin-left: 5px;
            background: #94a3b8;
            padding: 2px 5px;
            border-radius: 14px;
            color: white;
        }

        @media (max-width: 480px) {
            .contacts-list { max-height: 100px; }
            .action-icon-btn { padding: 6px 12px; font-size: 0.75rem; }
            #sendButton { padding: 8px 16px; min-width: 60px; font-size: 0.8rem; }
            #messageInput { padding: 8px 12px; font-size: 0.85rem; }
            .emoji-picker { grid-template-columns: repeat(7, 1fr); bottom: 105px; }
            .emoji-picker span { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="app-header">
            <div class="logo-icon">💬</div>
            <div class="header-text">
                <h2>SEYFİÇET</h2>
                <div class="sub-title">
                    <span>🔒 P2P Mesajlaşma</span>
                </div>
            </div>
        </div>
        
        <div class="chat-header">
            <div class="connection-status" id="status">Bağlantı bekleniyor...</div>
        </div>

        <div class="contacts-panel">
            <div class="my-info">
                <div class="my-id-box">
                    <div class="my-id-label">🔑 KALICI ID'NİZ</div>
                    <div class="my-id-value" id="myPeerId">Bağlanıyor...</div>
                </div>
                <button class="copy-id-btn" id="copyIdBtn">📋 Kopyala</button>
            </div>
            <div class="contacts-header">
                <span class="contacts-title">📒 KİŞİLERİM</span>
                <div class="action-buttons">
                    <button class="clear-messages-btn" id="clearMessagesBtn">🗑 Mesajları Sil</button>
                    <button class="add-contact-btn" id="addContactBtn">+ Yeni Kişi</button>
                </div>
            </div>
            <div class="contacts-list" id="contactsList">
                <div style="text-align:center; color:#94a3b8; padding:8px;">Henüz kişi eklenmemiş</div>
            </div>
        </div>

        <div class="current-chat-info">
            💬 Sohbet: <span id="activeContactName" class="current-chat-name">Seçili kişi yok</span>
            <span id="connectionRetryBadge" style="display:none;" class="retry-badge">🔄 Yeniden bağlanıyor...</span>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-container">
            <div class="message-input-row">
                <input type="text" id="messageInput" placeholder="Mesaj yazın..." disabled>
                <button id="sendButton" disabled>Gönder</button>
            </div>
            <div class="action-buttons-row">
                <button class="action-icon-btn" id="emojiBtn">😊 Emoji</button>
                <button class="action-icon-btn" id="fileBtn">📎 Dosya</button>
                <button class="action-icon-btn" id="imageBtn">🖼️ Resim</button>
            </div>
        </div>
    </div>

    <div id="contactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="contactNameInput" placeholder="Kişi adı" autocomplete="off">
            <input type="text" id="contactPeerIdInput" placeholder="Karşı tarafın Peer ID'si" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="modalSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ============ ÇOKLU BAĞLANTI YÖNETİMİ ============
        let myPermanentId = null;
        let peer = null;
        let currentConnection = null;      // Sadece bir aktif bağlantı
        let suspendedConnections = [];      // Askıya alınan bağlantılar (kapatılmış)
        let isConnected = false;
        let activeContactId = null;
        let activeContactPeerId = null;
        let activeContactName = "";
        let reconnectTimer = null;
        let isManualDisconnect = false;
        let emojiPicker = null;

        let contacts = [];
        let messagesHistory = {};

        // DOM
        const myPeerIdDiv = document.getElementById('myPeerId');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const contactsListDiv = document.getElementById('contactsList');
        const addContactBtn = document.getElementById('addContactBtn');
        const clearMessagesBtn = document.getElementById('clearMessagesBtn');
        const modal = document.getElementById('contactModal');
        const contactNameInput = document.getElementById('contactNameInput');
        const contactPeerIdInput = document.getElementById('contactPeerIdInput');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalSaveBtn = document.getElementById('modalSaveBtn');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        const activeContactNameSpan = document.getElementById('activeContactName');
        const connectionRetryBadge = document.getElementById('connectionRetryBadge');
        const emojiBtn = document.getElementById('emojiBtn');
        const fileBtn = document.getElementById('fileBtn');
        const imageBtn = document.getElementById('imageBtn');

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function getOrCreatePermanentId() {
            let savedId = localStorage.getItem('p2p_my_permanent_id');
            if (savedId && savedId.trim() !== "") return savedId;
            const newId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('p2p_my_permanent_id', newId);
            return newId;
        }

        // Tüm bağlantıları kapat (sadece aktif olanı değil)
        function closeAllConnections() {
            if (currentConnection) {
                try {
                    currentConnection.close();
                } catch(e) {}
                currentConnection = null;
            }
            // Askıya alınmış bağlantılar zaten kapatıldı
            suspendedConnections = [];
            isConnected = false;
        }

        // Yeni bağlantı kurmadan önce mevcut tüm bağlantıları temizle
        function switchToContact(contactId, peerId, contactName) {
            // Önceki bağlantıyı kapat
            if (currentConnection) {
                addSystemMessageToActive(`${activeContactName} ile bağlantı askıya alındı.`);
                closeAllConnections();
            }
            
            activeContactId = contactId;
            activeContactPeerId = peerId;
            activeContactName = contactName;
            activeContactNameSpan.innerText = contactName;
            renderMessagesForActiveContact();
            
            isManualDisconnect = false;
            initiateConnectionToPeer(peerId, contactName);
            highlightActiveContact();
        }

        function highlightActiveContact() {
            document.querySelectorAll('.contact-item').forEach(item => {
                item.classList.remove('active-contact');
                const btn = item.querySelector('.connect-contact-btn');
                if (btn && btn.dataset.id === activeContactId) {
                    item.classList.add('active-contact');
                }
            });
        }

        function initPeerWithPermanentId() {
            myPermanentId = getOrCreatePermanentId();
            myPeerIdDiv.textContent = myPermanentId;
            peer = new Peer(myPermanentId, {
                debug: 0,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            peer.on('open', (id) => { 
                if (id === myPermanentId) statusDiv.innerHTML = '✅ Kalıcı ID aktif!'; 
            });
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    localStorage.removeItem('p2p_my_permanent_id');
                    myPermanentId = getOrCreatePermanentId();
                    peer.destroy();
                    initPeerWithPermanentId();
                }
            });
            peer.on('disconnected', () => { 
                if (!isManualDisconnect && currentConnection) {
                    statusDiv.innerHTML = '🔄 Sunucu bağlantısı yenileniyor...';
                    peer.reconnect();
                }
            });
            peer.on('connection', handleIncomingConnection);
        }

        function handleIncomingConnection(incomingConn) {
            const contact = contacts.find(c => c.peerId === incomingConn.peer);
            if (!contact) { 
                incomingConn.close(); 
                return; 
            }
            
            // Eğer zaten aktif bir bağlantı varsa, yeni geleni reddet (tek aktif bağlantı)
            if (currentConnection && isConnected) {
                addSystemMessageToActive(`${contact.name} bağlanmaya çalıştı ancak aktif bağlantınız var.`);
                incomingConn.close();
                return;
            }
            
            // Mevcut bağlantıyı kapat (varsa)
            if (currentConnection) {
                closeAllConnections();
            }
            
            currentConnection = incomingConn;
            activeContactId = contact.id;
            activeContactPeerId = contact.peerId;
            activeContactName = contact.name;
            activeContactNameSpan.textContent = contact.name;
            renderMessagesForActiveContact();
            setupConnectionEvents(currentConnection, contact.name);
            addSystemMessageToActive(`${contact.name} sizinle bağlantı kurdu.`);
            setConnectedState(true);
            highlightActiveContact();
        }

        function setupConnectionEvents(connection, contactName) {
            connection.on('open', () => {
                setConnectedState(true);
                statusDiv.innerHTML = `✅ ${contactName} ile bağlantı aktif`;
                addSystemMessageToActive(`${contactName} ile görüşmeye hazırsınız.`);
                hideRetryBadge();
                if (reconnectTimer) clearTimeout(reconnectTimer);
            });
            
            connection.on('data', (data) => {
                if (activeContactId && currentConnection === connection) {
                    if (data.type === 'text') {
                        addMessageToHistory(activeContactId, data.text, contactName, false, 'text');
                    } else if (data.type === 'file') {
                        addMessageToHistory(activeContactId, data.name || 'Dosya', contactName, false, 'file', data.data, data.mime);
                    } else if (data.type === 'image') {
                        addMessageToHistory(activeContactId, data.name || 'Resim', contactName, false, 'image', data.data, data.mime);
                    }
                }
            });
            
            connection.on('close', () => {
                if (currentConnection === connection) {
                    addSystemMessageToActive(`${contactName} bağlantıyı kapattı.`);
                    setConnectedState(false);
                    currentConnection = null;
                    scheduleReconnect();
                }
            });
            
            connection.on('error', (err) => {
                if (currentConnection === connection) {
                    addSystemMessageToActive(`${contactName} bağlantı hatası`);
                    setConnectedState(false);
                    currentConnection = null;
                    scheduleReconnect();
                }
            });
        }

        function scheduleReconnect() {
            if (!activeContactId || isManualDisconnect) return;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            showRetryBadge();
            reconnectTimer = setTimeout(() => {
                if (!isConnected && activeContactId) {
                    const contact = contacts.find(c => c.id === activeContactId);
                    if (contact) {
                        addSystemMessageToActive(`${contact.name} için yeniden bağlanılıyor...`);
                        initiateConnectionToPeer(contact.peerId, contact.name);
                    }
                }
                hideRetryBadge();
            }, 3000);
        }

        function initiateConnectionToPeer(peerId, contactName) {
            if (!peer) return;
            
            // Mevcut bağlantıyı kapat
            if (currentConnection) {
                closeAllConnections();
            }
            
            isManualDisconnect = false;
            statusDiv.innerHTML = `🔄 ${contactName} bağlanıyor...`;
            const newConn = peer.connect(peerId);
            if (!newConn) return;
            
            currentConnection = newConn;
            setupConnectionEvents(currentConnection, contactName);
            
            // 10 saniye timeout
            setTimeout(() => {
                if (currentConnection === newConn && !isConnected) {
                    addSystemMessageToActive(`${contactName} bağlantı zaman aşımı`);
                    setConnectedState(false);
                    if (currentConnection === newConn) {
                        currentConnection = null;
                    }
                    scheduleReconnect();
                }
            }, 10000);
        }

        function setConnectedState(connected) {
            isConnected = connected;
            messageInput.disabled = !connected;
            sendButton.disabled = !connected;
            if (!connected && activeContactId) {
                statusDiv.innerHTML = '❌ Bağlantı kesildi, yeniden bağlanılıyor...';
            }
        }

        function showRetryBadge() { if (connectionRetryBadge) connectionRetryBadge.style.display = 'inline-block'; }
        function hideRetryBadge() { if (connectionRetryBadge) connectionRetryBadge.style.display = 'none'; }

        function sendTextMessage() {
            if (!isConnected || !currentConnection || !activeContactId) {
                addSystemMessageToActive('Önce bir kişi seçip bağlanın.');
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            currentConnection.send({ type: 'text', text: text });
            addMessageToHistory(activeContactId, text, 'Ben', true, 'text');
            messageInput.value = '';
            messageInput.focus();
        }

        function sendFile(file, type) {
            if (!isConnected || !currentConnection || !activeContactId) {
                addSystemMessageToActive('Bağlantı yok, dosya gönderilemez.');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                const payload = {
                    type: type,
                    name: file.name,
                    data: data,
                    mime: file.type
                };
                currentConnection.send(payload);
                addMessageToHistory(activeContactId, file.name, 'Ben', true, type, data, file.type);
            };
            reader.readAsDataURL(file);
        }

        function sendEmoji(emoji) {
            if (!isConnected || !currentConnection || !activeContactId) {
                addSystemMessageToActive('Önce bir kişi seçip bağlanın.');
                return;
            }
            currentConnection.send({ type: 'text', text: emoji });
            addMessageToHistory(activeContactId, emoji, 'Ben', true, 'text');
        }

        // Veri yönetimi
        function loadContacts() {
            const stored = localStorage.getItem('p2p_contacts_v2');
            contacts = stored ? JSON.parse(stored) : [];
            renderContactsList();
        }
        function saveContacts() { localStorage.setItem('p2p_contacts_v2', JSON.stringify(contacts)); }
        
        function loadMessagesHistory() {
            const stored = localStorage.getItem('p2p_messages_history_v2');
            messagesHistory = stored ? JSON.parse(stored) : {};
        }
        function saveMessagesHistory() { localStorage.setItem('p2p_messages_history_v2', JSON.stringify(messagesHistory)); }

        function addMessageToHistory(contactId, content, sender, isSent, msgType, fileData = null, mime = '') {
            if (!messagesHistory[contactId]) messagesHistory[contactId] = [];
            messagesHistory[contactId].push({
                content, sender, isSent, msgType, fileData, mime,
                timestamp: Date.now()
            });
            saveMessagesHistory();
            if (activeContactId === contactId) renderMessagesForActiveContact();
        }

        function addSystemMessageToActive(text) {
            if (!activeContactId) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message received';
            msgDiv.style.alignSelf = 'center';
            msgDiv.innerHTML = `<div class="message-content" style="background:#eef2ff; font-size:0.7rem; padding:4px 10px;">📡 ${escapeHtml(text)}</div>`;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function renderMessagesForActiveContact() {
            messagesArea.innerHTML = '';
            if (!activeContactId) {
                messagesArea.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">👈 Kişi seçin</div>';
                return;
            }
            const history = messagesHistory[activeContactId] || [];
            history.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                let contentHtml = '';
                if (msg.msgType === 'text') {
                    contentHtml = `<div class="message-content">${!msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''}${escapeHtml(msg.content)}</div>`;
                } else if (msg.msgType === 'image') {
                    contentHtml = `<div class="message-content file-message"><img src="${msg.fileData}" class="message-image" onclick="window.open('${msg.fileData}','_blank')" style="max-width:100%; border-radius:12px;"></div>`;
                } else if (msg.msgType === 'file') {
                    contentHtml = `<div class="message-content file-message" onclick="downloadFile('${msg.fileData}', '${msg.content}')">📎 ${escapeHtml(msg.content)}</div>`;
                }
                
                msgDiv.innerHTML = contentHtml + `<div class="message-time">${timeStr}</div>`;
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        window.downloadFile = (dataUrl, filename) => {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = filename;
            a.click();
        };

        function renderContactsList() {
            if (contacts.length === 0) {
                contactsListDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:8px;">📭 Henüz kişi yok</div>';
                return;
            }
            contactsListDiv.innerHTML = '';
            contacts.forEach(contact => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                if (activeContactId === contact.id) div.classList.add('active-contact');
                div.innerHTML = `
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(contact.name)}</div>
                        <div class="contact-peerid">${escapeHtml(contact.peerId.substring(0, 14))}...</div>
                    </div>
                    <div class="contact-actions">
                        <button class="connect-contact-btn" data-id="${contact.id}" data-peer="${contact.peerId}" data-name="${escapeHtml(contact.name)}">🔗 Bağlan</button>
                        <button class="delete-contact-btn" data-id="${contact.id}">🗑</button>
                    </div>
                `;
                contactsListDiv.appendChild(div);
            });
            document.querySelectorAll('.connect-contact-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.dataset.id;
                    const peerId = btn.dataset.peer;
                    const name = btn.dataset.name;
                    // Yeni kişi seçildiğinde mevcut bağlantıyı kapat
                    if (currentConnection) {
                        closeAllConnections();
                    }
                    switchToContact(id, peerId, name);
                };
            });
            document.querySelectorAll('.delete-contact-btn').forEach(btn => {
                btn.onclick = () => deleteContactById(btn.dataset.id);
            });
        }

        function deleteContactById(id) {
            if (confirm('Kişiyi silmek mesaj geçmişini de siler. Devam?')) {
                contacts = contacts.filter(c => c.id !== id);
                saveContacts();
                if (messagesHistory[id]) delete messagesHistory[id];
                saveMessagesHistory();
                if (activeContactId === id) {
                    activeContactId = null;
                    activeContactName = "";
                    activeContactNameSpan.innerText = "Seçili kişi yok";
                    if (currentConnection) {
                        closeAllConnections();
                    }
                    setConnectedState(false);
                    renderMessagesForActiveContact();
                }
                renderContactsList();
            }
        }

        function clearMessagesOnly() {
            if (!activeContactId) {
                alert('Önce bir kişi seçin.');
                return;
            }
            if (confirm('Bu kişiyle olan tüm mesajlaşma geçmişi silinecek. Devam et?')) {
                messagesHistory[activeContactId] = [];
                saveMessagesHistory();
                renderMessagesForActiveContact();
                addSystemMessageToActive('Mesaj geçmişi temizlendi.');
            }
        }

        function toggleEmojiPicker() {
            if (emojiPicker) { emojiPicker.remove(); emojiPicker = null; return; }
            emojiPicker = document.createElement('div');
            emojiPicker.className = 'emoji-picker';
            const emojis = ['😀', '😂', '🥰', '😎', '😢', '😡', '👍', '❤️', '🔥', '🎉', '🙏', '💯', '✨', '🍕', '☕', '🏆', '😍', '🥺', '🤣', '💪', '👋', '🎈', '⭐', '🌈'];
            emojis.forEach(emoji => {
                const span = document.createElement('span');
                span.textContent = emoji;
                span.onclick = () => {
                    sendEmoji(emoji);
                    emojiPicker.remove();
                    emojiPicker = null;
                };
                emojiPicker.appendChild(span);
            });
            document.body.appendChild(emojiPicker);
            emojiPicker.style.position = 'fixed';
            emojiPicker.style.bottom = '105px';
            emojiPicker.style.left = '10px';
            emojiPicker.style.right = '10px';
            emojiPicker.style.width = 'auto';
        }

        function selectFile(type) {
            const input = document.createElement('input');
            input.type = 'file';
            if (type === 'image') input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) sendFile(file, type);
            };
            input.click();
        }

        // Eventler
        addContactBtn.onclick = () => { modal.style.display = 'flex'; };
        clearMessagesBtn.onclick = clearMessagesOnly;
        modalCancelBtn.onclick = () => { modal.style.display = 'none'; };
        modalSaveBtn.onclick = () => {
            const name = contactNameInput.value.trim();
            const peerId = contactPeerIdInput.value.trim();
            if (!name || !peerId) { alert('Lütfen bilgileri doldurun'); return; }
            if (contacts.some(c => c.peerId === peerId)) { alert('Bu ID zaten mevcut'); return; }
            contacts.push({ id: Date.now().toString() + '_' + Math.random(), name, peerId });
            saveContacts();
            renderContactsList();
            modal.style.display = 'none';
        };
        sendButton.onclick = sendTextMessage;
        copyIdBtn.onclick = () => { navigator.clipboard.writeText(myPermanentId); copyIdBtn.textContent = '✅'; setTimeout(() => copyIdBtn.textContent = '📋 Kopyala', 1500); };
        messageInput.onkeypress = (e) => { if (e.key === 'Enter' && isConnected) sendTextMessage(); };
        emojiBtn.onclick = toggleEmojiPicker;
        fileBtn.onclick = () => selectFile('file');
        imageBtn.onclick = () => selectFile('image');
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; if (emojiPicker && !emojiPicker.contains(e.target) && e.target !== emojiBtn) { emojiPicker.remove(); emojiPicker = null; } };

        // Başlat
        loadContacts();
        loadMessagesHistory();
        initPeerWithPermanentId();
        renderMessagesForActiveContact();
    </script>
</body>
</html>
