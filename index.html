<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Anlık Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Mobil tıklama efekti kaldır */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh; /* Dinamik viewport (mobil tarayıcı çubukları için) */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        /* Tam ekran, çerçevesiz konteyner */
        .chat-container {
            width: 100%;
            height: 100%;
            max-width: none;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0; /* Telefonda hiçbir çerçeve/radius olmasın */
            box-shadow: none;
        }

        /* Header - daha kompakt mobil uyum */
        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 14px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .connection-status {
            font-size: 0.7rem;
            margin-top: 6px;
            color: #f0f0f0;
            font-weight: 500;
        }

        /* Bağlantı paneli - mobilde rahat dokunma */
        .connection-panel {
            padding: 12px 16px;
            background: #f8f9fc;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .peer-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .peer-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #4a5568;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .peer-id {
            font-family: 'SF Mono', 'Roboto Mono', monospace;
            font-size: 0.75rem;
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 12px;
            word-break: break-all;
            border: 1px solid #e2e8f0;
            color: #2d3748;
        }

        .connect-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .connect-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .connect-row input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 30px;
            font-size: 0.9rem;
            background: white;
            font-family: monospace;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }

        .connect-row input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }

        .connect-row button {
            padding: 12px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
            white-space: nowrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .connect-row button:active {
            transform: scale(0.97);
            background: #357abd;
        }

        /* Mesaj alanı - esnek scroll */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch; /* iOS yumuşak scroll */
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .sent .message-content {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .message-content {
            background: white;
            color: #1e293b;
            border: 0.5px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        /* Giriş alanı - mobil klavye dostu */
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #edf2f7;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            backdrop-filter: blur(0);
        }

        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
            background: #ffffff;
            transition: border 0.2s;
        }

        #messageInput:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74,144,226,0.2);
        }

        #sendButton {
            padding: 12px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #sendButton:active {
            transform: scale(0.96);
        }

        #sendButton:disabled {
            background: #b9c8f0;
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        /* Durum mesajları için renk */
        .status-message {
            font-style: italic;
            background: #eef2ff;
            color: #334155;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.75rem;
            text-align: center;
            max-width: 90%;
            align-self: center;
        }

        /* Telefonda kaydırma çubuğu ince ama kullanışlı */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        /* Buton ve input dokunma alanı rahat */
        button, input {
            touch-action: manipulation;
        }

        /* Çok küçük ekranlarda padding azalt */
        @media (max-width: 480px) {
            .connection-panel {
                padding: 10px 14px;
            }
            .connect-row input {
                padding: 10px 12px;
            }
            .connect-row button {
                padding: 10px 16px;
            }
            .message-content {
                font-size: 0.9rem;
            }
            .chat-header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🔒 P2P Anlık Mesajlaşma</h1>
            <div class="connection-status" id="status">Bağlantı bekleniyor...</div>
        </div>
        
        <div class="connection-panel">
            <div class="peer-info">
                <div class="peer-label">🔑 SİZİN ID'NİZ</div>
                <div class="peer-id" id="myPeerId">Bağlanıyor...</div>
            </div>
            <div class="connect-area">
                <div class="peer-label">👤 KARŞI TARAFIN ID'Sİ</div>
                <div class="connect-row">
                    <input type="text" id="remotePeerId" placeholder="Örneğin: 9b1deb4d-3b7d..." autocomplete="off">
                    <button id="connectBtn">Bağlan</button>
                </div>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <!-- Sistem mesajları ve sohbet buraya dinamik gelir -->
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Mesaj yaz..." disabled>
            <button id="sendButton" disabled>Gönder</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        (function(){
            let peer;
            let conn = null;
            let isConnected = false;
            let connectionAttempt = false;

            const messagesArea = document.getElementById('messagesArea');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const statusDiv = document.getElementById('status');
            const myPeerIdDiv = document.getElementById('myPeerId');
            const remotePeerIdInput = document.getElementById('remotePeerId');
            const connectBtn = document.getElementById('connectBtn');

            // Yardımcı: sistem mesajı (örneğin bağlantı durumu)
            function addSystemMessage(text) {
                const sysDiv = document.createElement('div');
                sysDiv.className = 'message received'; // hizalama için
                sysDiv.style.maxWidth = '90%';
                sysDiv.style.alignSelf = 'center';
                sysDiv.style.marginBottom = '6px';
                sysDiv.innerHTML = `
                    <div class="message-content" style="background:#eef2ff; color:#334155; text-align:center; font-size:0.75rem; padding:6px 12px;">
                        📡 ${text}
                    </div>
                `;
                messagesArea.appendChild(sysDiv);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            // Normal mesaj ekleme (kullanıcı mesajları)
            function addMessage(text, sender, isSent) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
                
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const displayName = isSent ? 'Ben' : (sender === 'Sistem' ? 'Sistem' : 'Karşı Taraf');
                
                messageDiv.innerHTML = `
                    <div class="message-content">
                        ${!isSent && sender !== 'Sistem' ? `<strong>${displayName}:</strong> ` : ''}
                        ${text}
                    </div>
                    <div class="message-time">${time}</div>
                `;
                
                // Sistem mesajları için farklı bir stil ama yine de received gibi göster
                if (sender === 'Sistem') {
                    messageDiv.querySelector('.message-content').style.background = '#e2e8f0';
                    messageDiv.querySelector('.message-content').style.color = '#1e293b';
                    messageDiv.querySelector('.message-content').style.fontStyle = 'italic';
                    messageDiv.style.alignSelf = 'center';
                    messageDiv.style.maxWidth = '85%';
                }
                
                messagesArea.appendChild(messageDiv);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            // Bağlantı durumunu güncelle (UI butonlar, status yazısı)
            function setConnected(connected, customMessage = null) {
                isConnected = connected;
                messageInput.disabled = !connected;
                sendButton.disabled = !connected;
                
                if (connected) {
                    statusDiv.innerHTML = customMessage || '✅ Bağlantı kuruldu! Mesajlaşabilirsiniz.';
                    statusDiv.style.color = '#d1fae5';
                } else {
                    if (!customMessage) {
                        statusDiv.innerHTML = '❌ Bağlantı kesildi. Yeniden bağlanın.';
                    } else {
                        statusDiv.innerHTML = customMessage;
                    }
                    statusDiv.style.color = '#fed7d7';
                }
            }

            // Bağlantıyı temizleme
            function cleanupConnection() {
                if (conn) {
                    try {
                        conn.close();
                    } catch(e) { /* ignore */ }
                    conn = null;
                }
                isConnected = false;
                setConnected(false);
            }

            // Gelen veri işleme
            function setupConnection(connection) {
                if (!connection) return;
                
                connection.on('open', () => {
                    isConnected = true;
                    setConnected(true, '✅ Bağlantı kuruldu! Mesajlaşabilirsiniz.');
                    addSystemMessage('Güvenli P2P bağlantısı aktif.');
                });
                
                connection.on('data', (data) => {
                    if (data && typeof data === 'object' && data.text) {
                        // Karşı taraftan gelen mesaj
                        addMessage(data.text, data.sender || 'Karşı Taraf', false);
                    } else if (typeof data === 'string') {
                        // fallback: düz metin olarak da destek
                        addMessage(data, 'Karşı Taraf', false);
                    }
                });
                
                connection.on('close', () => {
                    if (conn === connection) {
                        addSystemMessage('🔌 Karşı taraf bağlantıyı kapattı.');
                        cleanupConnection();
                    }
                });
                
                connection.on('error', (err) => {
                    console.warn('Bağlantı hatası:', err);
                    if (conn === connection) {
                        addSystemMessage('⚠️ Bağlantı hatası oluştu.');
                        cleanupConnection();
                    }
                });
            }

            // Bağlantı başlat (karşı tarafın idsi ile)
            function initiateConnection(remoteId) {
                if (!remoteId) {
                    addSystemMessage('Lütfen geçerli bir ID girin.');
                    return false;
                }
                
                // Eğer zaten bağlıysak önce kapat
                if (conn) {
                    cleanupConnection();
                }
                
                statusDiv.innerHTML = '🔄 Bağlanılıyor...';
                statusDiv.style.color = '#fef9c3';
                addSystemMessage(`🔗 ${remoteId.substring(0,8)}... ID'sine bağlanma isteği gönderildi.`);
                
                try {
                    const newConn = peer.connect(remoteId);
                    if (!newConn) {
                        throw new Error('Bağlantı nesnesi oluşturulamadı');
                    }
                    conn = newConn;
                    setupConnection(conn);
                    
                    // 7 saniye içinde bağlantı kurulmazsa hata göster
                    setTimeout(() => {
                        if (conn && !isConnected && conn.open === false) {
                            addSystemMessage('⏰ Bağlantı zaman aşımı. ID geçerli mi ve karşı taraf çevrimiçi mi?');
                            statusDiv.innerHTML = '❌ Zaman aşımı, bağlantı başarısız.';
                            statusDiv.style.color = '#FFB6C1';
                            cleanupConnection();
                        } else if (!conn) {
                            statusDiv.innerHTML = '❌ Bağlantı başarısız.';
                            statusDiv.style.color = '#FFB6C1';
                        }
                    }, 8000);
                    
                    return true;
                } catch (err) {
                    console.error(err);
                    addSystemMessage(`Bağlantı hatası: ${err.message}`);
                    statusDiv.innerHTML = '❌ Bağlantı kurulamadı.';
                    statusDiv.style.color = '#FFB6C1';
                    return false;
                }
            }

            // PeerJS başlatma ve eventler
            function initPeer() {
                // Peer opsiyonları: daha kararlı bağlantı için opsiyonel yapılandırma
                peer = new Peer({
                    debug: 0,
                    config: {'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]}
                });
                
                peer.on('open', (id) => {
                    myPeerIdDiv.textContent = id;
                    statusDiv.innerHTML = '✅ Hazır! Karşı taraf ID\'sini girip bağlanın.';
                    statusDiv.style.color = '#d1fae5';
                    addSystemMessage(`✨ ID'niz oluşturuldu. Paylaşarak bağlantı kurabilirsiniz.`);
                });
                
                // Gelen bağlantı isteklerini dinle
                peer.on('connection', (incomingConn) => {
                    // Eğer halihazırda bir bağlantı varsa, yeni bağlantıyı reddet ya da mevcutu değiştir
                    if (conn && isConnected) {
                        addSystemMessage('⚠️ Zaten aktif bağlantı var. Gelen istek reddedildi.');
                        incomingConn.close();
                        return;
                    }
                    
                    // Önceki bağlantı varsa temizle
                    if (conn) cleanupConnection();
                    
                    conn = incomingConn;
                    addSystemMessage('📞 Karşı taraf size bağlanmak istedi. Bağlantı kabul edildi.');
                    setupConnection(conn);
                    // Bağlantı kurulunca setConnected, connection.open event'inde tetiklenecek
                });
                
                peer.on('error', (err) => {
                    console.warn('PeerJS hatası:', err);
                    if (err.type === 'unavailable-id' || err.type === 'peer-unavailable') {
                        addSystemMessage(`Hata: ${err.message || 'ID geçersiz veya kullanılamıyor.'}`);
                        statusDiv.innerHTML = '❌ ID hatası, yeniden deneyin.';
                        statusDiv.style.color = '#FFB6C1';
                    } else if (err.type === 'network') {
                        addSystemMessage('🌐 Ağ hatası, internet bağlantınızı kontrol edin.');
                    } else {
                        addSystemMessage(`Peer hatası: ${err.message || 'Bağlantı sorunu'}`);
                    }
                    // Bağlantı varsa temizle ama peer'i kapatma yeniden başlatmaya gerek yok
                    if (conn) cleanupConnection();
                });
                
                peer.on('disconnected', () => {
                    // Peer sunucuyla bağlantı koptuysa, tekrar bağlanmaya çalış
                    addSystemMessage('⚠️ Peer sunucusu ile bağlantı kesildi, yeniden bağlanılıyor...');
                    statusDiv.innerHTML = '🔄 Sunucu bağlantısı yenileniyor...';
                    if (peer && !peer.destroyed) {
                        peer.reconnect();
                    }
                });
            }
            
            // Mesaj gönderme
            function sendMessage() {
                if (!isConnected || !conn) {
                    addSystemMessage('Mesaj göndermek için bağlı değilsiniz.');
                    return;
                }
                
                const message = messageInput.value.trim();
                if (message === "") return;
                
                // Veriyi gönder (nesne olarak)
                const payload = {
                    text: message,
                    sender: 'Ben',
                    timestamp: Date.now()
                };
                
                try {
                    conn.send(payload);
                    addMessage(message, 'Ben', true);
                    messageInput.value = '';
                    // Input'a odaklanma (mobilde klavye kapanmasın)
                    messageInput.focus();
                } catch (err) {
                    console.error('Gönderim hatası:', err);
                    addSystemMessage('Mesaj gönderilemedi, bağlantı kopmuş olabilir.');
                    cleanupConnection();
                }
            }
            
            // Event listener'lar
            connectBtn.addEventListener('click', () => {
                const remoteId = remotePeerIdInput.value.trim();
                if (!remoteId) {
                    addSystemMessage('Lütfen karşı tarafın ID\'sini girin.');
                    // mobilde kısa titreşim efekti gibi görsel feedback
                    remotePeerIdInput.style.borderColor = '#f56565';
                    setTimeout(() => { remotePeerIdInput.style.borderColor = '#cbd5e0'; }, 800);
                    return;
                }
                remotePeerIdInput.style.borderColor = '#cbd5e0';
                
                // Eğer bağlantı zaten varsa, kullanıcıya sor ve yeniden bağlan
                if (conn && isConnected) {
                    if (confirm('Zaten aktif bir bağlantı var. Yeni bağlantı kurmak mevcut bağlantıyı sonlandırır. Devam et?')) {
                        cleanupConnection();
                        initiateConnection(remoteId);
                    }
                } else {
                    initiateConnection(remoteId);
                }
            });
            
            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (isConnected && sendButton.disabled === false) {
                        sendMessage();
                    }
                }
            });
            
            // Mobilde input alanını daha iyi deneyim için klavye açıldığında mesaj alanına scroll
            let originalHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                if (messagesArea) {
                    setTimeout(() => {
                        messagesArea.scrollTop = messagesArea.scrollHeight;
                    }, 100);
                }
            });
            
            // Sayfa yüklendiğinde peer başlat
            initPeer();
            
            // Sayfa kapanırken bağlantıları temizle (opsiyonel)
            window.addEventListener('beforeunload', () => {
                if (conn) conn.close();
                if (peer && !peer.destroyed) peer.destroy();
            });
        })();
    </script>
</body>
</html>
